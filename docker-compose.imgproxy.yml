# imgproxy - Service de transformation d'images gratuit
# Documentation: https://docs.imgproxy.net/
#
# Usage:
#   docker compose -f docker-compose.imgproxy.yml up -d
#
# URL Format (imgproxy):
#   /rs:fit:{width}:{height}/q:{quality}/plain/{source_url}@webp
#
# Exemple:
#   http://localhost:8080/rs:fit:800:600/q:80/plain/https://cxpojprgwgubzjyqzmoq.supabase.co/storage/v1/object/public/rack-images/260/6216001.JPG@webp

services:
  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: imgproxy
    environment:
      # Bind address
      IMGPROXY_BIND: ":8080"

      # Security: Only allow Supabase as source
      IMGPROXY_ALLOWED_SOURCES: "https://cxpojprgwgubzjyqzmoq.supabase.co/"

      # WebP/AVIF auto-detection basé sur Accept header (options modernes)
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_AUTO_AVIF: "true"
      IMGPROXY_ENFORCE_WEBP: "false"  # Respecter le format demandé

      # Qualité par défaut
      IMGPROXY_QUALITY: "80"
      IMGPROXY_AVIF_QUALITY: "75"
      IMGPROXY_WEBP_QUALITY: "80"

      # Limites de résolution (protection contre abus)
      IMGPROXY_MAX_SRC_RESOLUTION: "50"  # 50 megapixels max
      IMGPROXY_MAX_ANIMATION_FRAMES: "1"  # Pas de GIFs animés

      # ═══════════════════════════════════════════════════════════════
      # 🚀 CACHE MÉMOIRE - Amélioration performance +30-50%
      # ═══════════════════════════════════════════════════════════════
      # Cache en mémoire (pas besoin de Redis)
      IMGPROXY_RESULT_CACHE_SIZE: "256"      # 256 images transformées en cache
      IMGPROXY_SOURCE_CACHE_SIZE: "128"      # 128 images sources en cache

      # Cache headers pour navigateur/CDN (Cloudflare cache 1 an)
      IMGPROXY_CACHE_CONTROL_PASSTHROUGH: "false"
      IMGPROXY_TTL: "31536000"               # 1 an en secondes (SUCCESS uniquement)
      IMGPROXY_SET_CANONICAL_HEADER: "true"

      # ═══════════════════════════════════════════════════════════════
      # 🛡️ Anti cache-poisoning sur upstream failure (INC-2026-015 / ADR-078/079)
      # ═══════════════════════════════════════════════════════════════
      # Sans ces 3 vars, un upstream Supabase 400 (« Source image is unreachable »)
      # était renvoyé HTTP 200 + cache-control max-age=1an + immutable, et Caddy
      # ne pouvait pas matcher pour court-cache → tout futur Tier B-rev sous le
      # même nom serait masqué par le placeholder cached 1 an.
      #
      # Architecture finale (corrigée v3.2) :
      #   1. imgproxy détecte upstream 4xx → sert no.png comme fallback.
      #   2. imgproxy renvoie HTTP 404 explicite (HTTP_CODE=404) — non plus 200.
      #   3. Caddy `handle_response @upstream_4xx` (Caddyfile) match le 404 et
      #      écrase Cache-Control en 5min must-revalidate.
      # → Le placeholder est servi (UX OK), mais cache court → toute future
      # vraie image arrive sous 5min sans purge manuelle.
      IMGPROXY_FALLBACK_IMAGE_URL: "https://cxpojprgwgubzjyqzmoq.supabase.co/storage/v1/object/public/uploads/articles/no.png"
      IMGPROXY_FALLBACK_IMAGE_TTL: "60"        # TTL interne d'imgproxy pour rafraîchir
                                               # la source fallback en cache mémoire
                                               # (pas le Cache-Control HTTP renvoyé).
      IMGPROXY_FALLBACK_IMAGE_HTTP_CODE: "404" # Status explicite 4xx, condition
                                               # nécessaire pour le matching Caddy.

      # Performance
      IMGPROXY_CONCURRENCY: "4"
      IMGPROXY_MAX_CLIENTS: "100"
      IMGPROXY_DOWNLOAD_TIMEOUT: "10"
      IMGPROXY_READ_REQUEST_TIMEOUT: "10"  # Remplace IMGPROXY_READ_TIMEOUT
      IMGPROXY_WRITE_RESPONSE_TIMEOUT: "10"  # Remplace IMGPROXY_WRITE_TIMEOUT

      # Logging
      IMGPROXY_LOG_LEVEL: "warn"
      IMGPROXY_LOG_FORMAT: "json"

      # Désactiver signature en dev (activer en prod avec IMGPROXY_KEY/SALT)
      IMGPROXY_ALLOW_INSECURE_URLS: "true"

    ports:
      - "8081:8080"
    networks:
      - automecanik-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  automecanik-prod:
    external: true
