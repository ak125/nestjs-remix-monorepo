version: '3.8'

services:
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: fafa_meilisearch
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY:-masterKey123}
      - MEILI_ENV=${NODE_ENV:-development}
      - MEILI_DB_PATH=/meili_data
      - MEILI_HTTP_ADDR=0.0.0.0:7700
      - MEILI_LOG_LEVEL=INFO
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
      - ./meilisearch/dumps:/dumps
    restart: unless-stopped
    networks:
      - fafa_network

  redis:
    image: redis:7-alpine
    container_name: fafa_redis
    # SECURITY: Never expose Redis publicly - internal network only
    # BSI CB-Report#20260422-10008190 — ports retirés volontairement
    # Accès via réseau Docker uniquement (meilisearch et autres services
    # joignent `redis` via le DNS Docker interne sur fafa_network)
    # Pour debug local : docker exec fafa_redis redis-cli
    # ports:
    #   - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - fafa_network

volumes:
  meilisearch_data:
    driver: local
  redis_data:
    driver: local

networks:
  fafa_network:
    external: false
