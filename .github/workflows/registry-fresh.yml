name: Registry freshness (ADR-058 PR-E, Phase 1 warn-only)

# Phase 1 freshness gate per ADR-058 §Acceptance V1 :
#   - warning-only (continue-on-error: true)
#   - verifies Layer 1 + Layer 2 → Layer 3 canonical projection is reproducible
#   - confirms 4 V1 invariants pass on the canonical
#
# When PR-G ships (Phase 2 block-new), a sibling workflow
# `registry-new-file-gate.yml` will block new files lacking owner/domain.
# This freshness check stays warn-only until V2 block-all.

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/registry/**"
      - "scripts/audit/build-deep-inventory.js"
      - "scripts/audit/build-db-usage-map.js"
      - "packages/registry/**"
      - "audit/registry/**"
      - ".spec/00-canon/repository-registry/**"
      - "backend/supabase/migrations/**"
      - ".github/workflows/registry-fresh.yml"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "scripts/registry/**"
      - "packages/registry/**"
      - ".spec/00-canon/repository-registry/**"

jobs:
  registry-fresh:
    name: Registry freshness (warn-only, Phase 1)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    continue-on-error: true # Phase 1 = warning-only per ADR-058 §Acceptance V1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Run upstream audit producers
        run: npm run audit:inventory

      - name: Build Layer 1 + Layer 3 canonical
        run: npm run registry

      - name: Validate overlay (Layer 2)
        run: npm run registry:validate

      - name: Validate canonical invariants (V1-4 minimal)
        run: npm run registry:validate-invariants

      - name: Determinism check (V1-2 — canonical hash stable across 2 runs)
        # Phase 1 warn-only : never exit 1 ; surface drift as GitHub annotation only.
        # Promotion to ERROR happens in V1.5 (signal-proven 14j of clean determinism).
        run: |
          sha256sum audit/registry/canonical.json > /tmp/c1.txt
          npm run registry --silent
          sha256sum audit/registry/canonical.json > /tmp/c2.txt
          if ! diff -q /tmp/c1.txt /tmp/c2.txt; then
            echo "::warning::canonical.json not deterministic across 2 runs"
            diff /tmp/c1.txt /tmp/c2.txt || true
          else
            echo "✓ canonical.json deterministic"
          fi

      - name: Freshness diff (canonical.json committed = canonical.json rebuilt)
        # Phase 1 warn-only : do not exit 1 on drift. Drift may be transient
        # (main moved between commit and CI run). Promotion to ERROR happens
        # in PR-G strict gate + V1.5 baseline ratchet.
        run: |
          if git diff --exit-code audit/registry/canonical.json; then
            echo "✓ canonical.json in sync with sources"
          else
            echo "::warning::audit/registry/canonical.json drifted vs Layer 1+2 sources (run \`npm run registry\` locally to refresh)"
            git diff --stat audit/registry/canonical.json || true
          fi

      - name: Run RPC parser fixture tests
        run: npm run registry:test:rpc-parser

      - name: Summary
        if: always()
        run: |
          {
            echo "## Registry freshness — Phase 1 (warn-only)";
            echo "";
            if [ -f audit/registry/canonical.json ]; then
              count_files=$(jq '.files | length' < audit/registry/canonical.json);
              count_tables=$(jq '.db.tables | length' < audit/registry/canonical.json);
              count_rpc=$(jq '.db.rpc | length' < audit/registry/canonical.json);
              count_deps=$(jq '.deps | length' < audit/registry/canonical.json);
              count_runtime=$(jq '.runtime | length' < audit/registry/canonical.json);
              sot_fp=$(jq -r '.meta.sotFingerprint' < audit/registry/canonical.json);
              echo "- **files**: ${count_files}";
              echo "- **db.tables**: ${count_tables}";
              echo "- **db.rpc**: ${count_rpc}";
              echo "- **deps**: ${count_deps}";
              echo "- **runtime**: ${count_runtime}";
              echo "- **sotFingerprint**: \`${sot_fp}\`";
            else
              echo "- ❌ canonical.json missing";
            fi
          } >> "$GITHUB_STEP_SUMMARY"
