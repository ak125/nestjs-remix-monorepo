name: 🕵️ Secrets History Audit (full git history)

# ADR-043 — Plan F (DevSecOps) Sprint 1 ticket #5.
# Periodic deep-scan of full git history with gitleaks + trufflehog.
# Complements the per-PR `🔐 Secrets Detection` job (incremental, blocking)
# by surfacing historical leaks for triage and remediation.
#
# Output: job summary + SARIF upload (gitleaks). Findings here do NOT block
# merges — the per-PR gate is the merge gate. This workflow is forensic.

on:
  schedule:
    # Weekly Monday 03:00 UTC (low-traffic, post-Sunday-quiet-hours)
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks-history:
    name: 🔐 Gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.21.2
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan full git history (redact, SARIF report)
        id: gitleaks
        continue-on-error: true
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --redact \
            --report-format sarif \
            --report-path gitleaks-history.sarif \
            --exit-code 1 \
            --no-banner

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-history.sarif
          category: gitleaks-history-audit

      - name: Job summary
        if: always()
        run: |
          {
            echo "## 🕵️ Gitleaks Full-History Audit"
            echo ""
            if [ "${{ steps.gitleaks.outcome }}" = "success" ]; then
              echo "✅ **Clean** — no secret patterns detected in git history."
            else
              echo "⚠️ **Findings detected** — check the Security tab (code scanning) for SARIF results."
              echo ""
              echo "These may be historical leaks. Triage:"
              echo "1. Confirm if secret is real and active (verify by attempted use)."
              echo "2. If active → rotate immediately and document in audit-trail."
              echo "3. If historical/dead → add to \`.gitleaks.toml\` allowlist with comment."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  trufflehog-history:
    name: 🐷 TruffleHog (full history filesystem)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog filesystem scan (verified + unknown)
        id: trufflehog
        continue-on-error: true
        uses: trufflesecurity/trufflehog@v3.83.7
        with:
          path: ./
          extra_args: --results=verified,unknown

      - name: Job summary
        if: always()
        run: |
          {
            echo "## 🐷 TruffleHog Filesystem Audit"
            echo ""
            if [ "${{ steps.trufflehog.outcome }}" = "success" ]; then
              echo "✅ **Clean** — no verified or unknown-detector secrets found."
            else
              echo "⚠️ **Findings detected** — see step logs above."
              echo ""
              echo "Triage same procedure as gitleaks-history. Live verified secrets must be rotated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
