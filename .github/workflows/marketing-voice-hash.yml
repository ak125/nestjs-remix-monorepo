name: marketing-voice-hash

# Verify the monorepo Marketing Voice copy matches the canonical
# distribution_sha256 published by ak125/governance-vault in
# 99-meta/canon-hashes.json (key `marketing_voice`).
# Source: rules-marketing-voice.md §"Distribution canonique" + ADR-036.
# Pattern: miroir de agent-exit-contract-hash.yml.

on:
  push:
    branches: [main]
    paths:
      - ".claude/rules/marketing-voice.md"
      - "workspaces/marketing/.claude/rules/marketing-voice.md"
      - "scripts/ci/check-marketing-voice-hash.sh"
      - ".github/workflows/marketing-voice-hash.yml"
  pull_request:
    paths:
      - ".claude/rules/marketing-voice.md"
      - "workspaces/marketing/.claude/rules/marketing-voice.md"
      - "scripts/ci/check-marketing-voice-hash.sh"
      - ".github/workflows/marketing-voice-hash.yml"
  schedule:
    # Daily at 03:35 UTC (5min après AEC) — catch drift between merges.
    - cron: "35 3 * * *"
  repository_dispatch:
    types: [canon-updated]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        copy:
          - .claude/rules/marketing-voice.md
          - workspaces/marketing/.claude/rules/marketing-voice.md
    steps:
      - uses: actions/checkout@v4
      - name: Verify ${{ matrix.copy }}
        run: bash scripts/ci/check-marketing-voice-hash.sh "${{ matrix.copy }}"
