name: Dependabot Auto-merge

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Auto-merge minor pour groupes ecosystem coordonnés : ces groupes
      # (tiptap/storybook/vite, cf. .github/dependabot.yml) garantissent
      # l'alignement major intra-famille (sinon incompat runtime, cf.
      # storybook 9 vs addon-onboarding@10 le 2026-05-04). Une minor
      # groupée a donc un profil de risque ≈ patch isolée. Whitelist
      # explicite : ajouter un groupe = décision consciente. Retirer un
      # groupe si une régression silencieuse est observée en post-deploy.
      - name: Enable auto-merge for safe updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          (steps.meta.outputs.update-type == 'version-update:semver-minor'
           && steps.meta.outputs.dependency-type == 'direct:development') ||
          steps.meta.outputs.package-ecosystem == 'github_actions' ||
          (steps.meta.outputs.update-type == 'version-update:semver-minor'
           && contains(fromJSON('["tiptap-ecosystem","storybook-ecosystem","vite-ecosystem"]'), steps.meta.outputs.dependency-group))
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
