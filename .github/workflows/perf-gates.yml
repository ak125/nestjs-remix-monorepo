name: 🎯 Performance Gates

on:
  pull_request:
    branches: [main]
    # Pattern "required-but-skippable" (PR #364 unblock) :
    # - Le workflow run TOUJOURS sur PR pour pouvoir produire le check
    #   "CWV Performance Check" exigé par branch protection main.
    # - Le job a un step early qui détecte les paths frontend-relevant via
    #   dorny/paths-filter. Si aucun path frontend n'est touché, les steps
    #   lourds (build + bundle-stats) sont skippés et le job émet success.
    # - Conserve la propriété anti-Dependabot regression (#279-#283 du
    #   2026-05-04) : aucun build pour les bumps dev-deps backend.
    # - Évite le blocage des PRs scripts-only (ex: #364 PR-D docstring)
    #   qui n'auraient pas trigger le workflow auparavant et restaient
    #   bloquées sur "14 of 14 expected" en branch protection.

# Thresholds : voir frontend/bundle-stats.config.json (budgets structurels
# déterministes — taille/count des assets du build client, mesurés directement
# sur disque sans booter Chrome). Documentation + philosophie + procédure
# de mise à jour dans frontend/bundle-stats.README.md.
#
# Pourquoi pas Lighthouse-CI ici (historique 2026-05-14) :
# Variance synthétique 14.5× observée sur runner partagé (TBT 160 ms median vs
# 1823 ms spike sur code identique), flake rate 13 % empirique sur 100 runs.
# Lighthouse en CI synthétique mesure mal et coûte ~9 min/PR (build + server
# boot + mocks Supabase + 3 runs Chrome). Bundle stats = même protection
# régression structurelle, déterministe, ~2 min/PR. CWV utilisateurs réels =
# chantier ADR séparé via CrUX API (data field, ce que Google Search utilise).

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle-stats:
    # Nom du check identique à l'ancien job lighthouse — préserve la branch
    # protection rule "CWV Performance Check" sans nécessiter de change UI.
    name: 🔍 CWV Performance Check
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      # Path filter au niveau job (vs workflow-level) pour permettre au job
      # de produire un check status "success" même quand les paths ne match
      # pas. Pattern "required-but-skippable" (cf. on.pull_request comment).
      - name: Detect frontend-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'packages/**'
              - '.github/workflows/perf-gates.yml'
              - 'frontend/.size-limit.json'

      - name: Skip notice (no frontend-relevant changes)
        if: steps.filter.outputs.frontend != 'true'
        run: |
          echo "::notice::No frontend-relevant paths changed — skipping bundle stats (success)."
          echo "Touched paths : $(git diff --name-only origin/${{ github.base_ref }}...HEAD | head -20)"

      - name: Setup Node.js
        if: steps.filter.outputs.frontend == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        if: steps.filter.outputs.frontend == 'true'
        run: npm ci

      - name: Build (turbo — frontend + workspace deps in order)
        if: steps.filter.outputs.frontend == 'true'
        # `npm run build` = `turbo build` au root. Respecte le DAG des
        # workspace deps (@repo/database-types, @monorepo/shared-types, etc.)
        # qui doivent être built avant frontend pour que Remix puisse les
        # résoudre. `npm run -w frontend build` seul casse cette ordre
        # (cf. PR #506 first run failure : "Failed to resolve entry for
        # package @repo/database-types").
        run: npm run build
        env:
          # Build TypeScript/Vite — pas d'exécution NestJS, donc pas de mocks
          # Supabase service_role, ni RAG, ni payments. Seuls les VITE_* publics
          # peuvent être baked dans le bundle client si la config Vite les pull.
          # Fallback aux mocks quand les secrets ne sont pas exposés (PRs
          # Dependabot et forks — politique GitHub 2021 anti-exfiltration).
          NODE_ENV: production
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://mock.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY || 'ci-mock-anon-key' }}

      - name: Bundle size gate (size-limit, gzip)
        if: steps.filter.outputs.frontend == 'true'
        # size-limit (Andrey Sitnik) — standard industriel (React, Redux,
        # MobX, Prettier, Lodash). Source de vérité unique :
        # frontend/.size-limit.json. Gzip natif. Exit non-zero sur dépassement
        # → vrai gate, pas warn-only comme l'ancien inline bash de ci.yml.
        # Voir frontend/size-limit.README.md pour philosophie + calibration.
        run: |
          npm run size 2>&1 | tee size-limit-output.txt

      - name: Generate step summary
        if: steps.filter.outputs.frontend == 'true' && always()
        run: |
          echo "## 📦 Bundle size — size-limit (gzip)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Déterministe, mesuré directement sur \`frontend/build/client/assets/\` — pas de Lighthouse, pas de Chrome, pas de mocks." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat size-limit-output.txt | grep -E "^[[:space:]]*(Size|Size limit|Time|Loading)|^[[:space:]]+[A-Z]" >> "$GITHUB_STEP_SUMMARY" || cat size-limit-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_CWV utilisateurs réels : monitoring CrUX (chantier ADR séparé, hors scope ce gate)._" >> "$GITHUB_STEP_SUMMARY"
