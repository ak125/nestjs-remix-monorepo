name: 🩺 PROD Smoke Tests

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  CONTAINER: nestjs-remix-monorepo-prod
  CADDY_CURL: curl -sk --max-time 15 --resolve www.automecanik.com:443:127.0.0.1
  IMGPROXY_TEST_IMAGE: https://cxpojprgwgubzjyqzmoq.supabase.co/storage/v1/object/public/rack-images/260/6216001.JPG
  TEST_R1_URL: /pieces/filtre-a-huile-7.html
  TEST_R2_URL: /pieces/capteur-temperature-d-air-admission-3939/renault-140/modus-140053/1-5-dci-18314.html

jobs:
  smoke-tests:
    name: 🩺 Production Health Check
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5

    steps:
      - name: 🏥 Health endpoint
        run: |
          RESPONSE=$(docker exec $CONTAINER wget -qO- http://localhost:3000/health 2>/dev/null)
          echo "Response: $RESPONSE"
          if ! echo "$RESPONSE" | grep -q '"status":"ok"'; then
            echo "❌ Health check failed"
            exit 1
          fi
          echo "✅ Health: OK"

      - name: 🌐 Homepage
        run: |
          RESPONSE=$(docker exec $CONTAINER wget -qO- http://localhost:3000/ 2>/dev/null | head -100)
          TITLE=$(echo "$RESPONSE" | grep -oP '<title>\K[^<]+' | head -1)
          if [ -z "$TITLE" ]; then
            echo "❌ Homepage has empty <title>"
            exit 1
          fi
          echo "✅ Homepage: title='$TITLE'"

      - name: 📦 Pages multi-rôles (8 URLs)
        run: |
          FAILED=0
          URLS=(
            "/pieces/filtre-a-huile-7.html"
            "/pieces/soufflet-de-direction-191.html"
            "/pieces/joint-de-cache-culbuteurs-321.html"
            "/pieces/ampoule-feu-clignotant-105.html"
            "/pieces/bague-d-etancheite-cardan-624.html"
            "/blog-pieces-auto/conseils/amortisseur"
            "/blog-pieces-auto/guide-achat/roulement-de-roue"
            "/sitemap.xml"
          )
          for URL in "${URLS[@]}"; do
            STATUS=$(docker exec $CONTAINER wget --spider -qS "http://localhost:3000$URL" 2>&1 | grep "HTTP/" | tail -1 | awk '{print $2}')
            if [ "$STATUS" = "200" ]; then
              echo "✅ $URL -> HTTP $STATUS"
            else
              echo "❌ $URL -> HTTP $STATUS"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            exit 1
          fi
          echo "✅ All 8 pages OK"

      - name: 🔍 SEO Meta tags
        run: |
          BODY=$(docker exec $CONTAINER wget -qO- "http://localhost:3000$TEST_R1_URL" 2>/dev/null)
          FAILED=0

          # meta description non-empty
          DESC=$(echo "$BODY" | grep -oP 'name="description" content="\K[^"]+' | head -1)
          if [ -z "$DESC" ]; then
            echo "❌ meta description empty"
            FAILED=1
          else
            echo "✅ description: ${DESC:0:80}..."
          fi

          # canonical format
          CANONICAL=$(echo "$BODY" | grep -oP 'rel="canonical" href="\K[^"]+' | head -1)
          if echo "$CANONICAL" | grep -qE '^https://www\.automecanik\.com/pieces/[a-z0-9-]+-[0-9]+\.html$'; then
            echo "✅ canonical: $CANONICAL"
          else
            echo "❌ canonical format invalid: '$CANONICAL'"
            FAILED=1
          fi

          # og:url matches canonical
          OG_URL=$(echo "$BODY" | grep -oP 'property="og:url" content="\K[^"]+' | head -1)
          if [ "$OG_URL" = "$CANONICAL" ]; then
            echo "✅ og:url matches canonical"
          else
            echo "❌ og:url ($OG_URL) != canonical ($CANONICAL)"
            FAILED=1
          fi

          # robots != noindex on valid page
          ROBOTS=$(echo "$BODY" | grep -oP 'name="robots" content="\K[^"]+' | head -1)
          if echo "$ROBOTS" | grep -qi "noindex"; then
            echo "❌ noindex on valid R1 page! robots='$ROBOTS'"
            FAILED=1
          else
            echo "✅ robots: ${ROBOTS:-'absent (ok)'}"
          fi

          # JSON-LD present and valid
          JSONLD=$(echo "$BODY" | grep -oP 'type="application/ld\+json">\K[^<]+' | head -1)
          if [ -z "$JSONLD" ]; then
            echo "❌ JSON-LD absent"
            FAILED=1
          else
            RESULT=$(echo "$JSONLD" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          graph=d.get('@graph',[])
          types=[n.get('@type') for n in graph]
          missing=[]
          if 'CollectionPage' not in types: missing.append('CollectionPage')
          if 'FAQPage' not in types: missing.append('FAQPage')
          if missing:
            print('MISSING:' + ','.join(missing))
          else:
            print('OK:' + ','.join(types))
          " 2>/dev/null || echo "INVALID_JSON")
            if echo "$RESULT" | grep -q "^OK:"; then
              echo "✅ JSON-LD @graph: ${RESULT#OK:}"
            elif echo "$RESULT" | grep -q "^MISSING:"; then
              echo "❌ JSON-LD missing: ${RESULT#MISSING:}"
              FAILED=1
            else
              echo "❌ JSON-LD invalid JSON"
              FAILED=1
            fi
          fi

          if [ "$FAILED" = "1" ]; then exit 1; fi
          echo "✅ All SEO meta checks passed"

      - name: 🔌 API catalog
        run: |
          RESPONSE=$(docker exec $CONTAINER wget -qO- http://localhost:3000/api/catalog/families 2>/dev/null)
          if [ -z "$RESPONSE" ]; then
            echo "❌ API catalog: empty response"
            exit 1
          fi
          COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('data',d.get('families',[]))))" 2>/dev/null || echo "0")
          if [ "$COUNT" -lt 10 ]; then
            echo "❌ API catalog returned only $COUNT families (expected 200+)"
            exit 1
          fi
          echo "✅ API catalog: $COUNT families"

      - name: 🖼️ imgproxy AVIF + WebP
        run: |
          FAILED=0
          for FMT in avif webp; do
            STATUS=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" "http://localhost:8081/rs:fit:400/q:80/plain/$IMGPROXY_TEST_IMAGE@$FMT")
            if [ "$STATUS" = "200" ]; then
              echo "✅ imgproxy $FMT: HTTP 200"
            else
              echo "❌ imgproxy $FMT: HTTP $STATUS"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then exit 1; fi

      - name: 🗺️ Sitemap + robots.txt
        run: |
          FAILED=0

          # sitemap.xml is a sitemapindex with 5+ entries
          SITEMAP=$($CADDY_CURL "https://www.automecanik.com/sitemap.xml" 2>/dev/null)
          if echo "$SITEMAP" | grep -q '<sitemapindex'; then
            COUNT=$(echo "$SITEMAP" | grep -c '<sitemap>' 2>/dev/null || echo "0")
            if [ "$COUNT" -ge 5 ]; then
              echo "✅ sitemap.xml: sitemapindex with $COUNT sub-sitemaps"
            else
              echo "❌ sitemap.xml only has $COUNT sub-sitemaps (expected 5+)"
              FAILED=1
            fi
          else
            echo "❌ sitemap.xml is not a sitemapindex"
            FAILED=1
          fi

          # sitemap-categories.xml HTTP 200
          STATUS=$($CADDY_CURL -L -o /dev/null -w "%{http_code}" "https://www.automecanik.com/sitemaps/sitemap-categories.xml")
          if [ "$STATUS" = "200" ]; then
            echo "✅ sitemap-categories.xml: HTTP 200"
          else
            echo "❌ sitemap-categories.xml: HTTP $STATUS"
            FAILED=1
          fi

          # robots.txt contains Sitemap directive
          ROBOTS=$($CADDY_CURL "https://www.automecanik.com/robots.txt" 2>/dev/null)
          if echo "$ROBOTS" | grep -q "Sitemap:"; then
            echo "✅ robots.txt: Sitemap directive present"
          else
            echo "❌ robots.txt missing Sitemap directive"
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then exit 1; fi

      - name: 📊 Cache headers (via Caddy)
        id: cache-check
        continue-on-error: true
        run: |
          HEADERS=$($CADDY_CURL -I "https://www.automecanik.com$TEST_R1_URL")
          CACHE=$(echo "$HEADERS" | grep -i "cache-control" | head -1)
          echo "Cache-Control: $CACHE"
          if ! echo "$CACHE" | grep -qi "s-maxage"; then
            echo "⚠️ WARNING: s-maxage missing from Cache-Control"
            exit 1
          fi
          echo "✅ Cache headers: s-maxage present"

      - name: ⏱️ TTFB check
        id: ttfb-check
        continue-on-error: true
        run: |
          TTFB=$($CADDY_CURL -o /dev/null -w "%{time_starttransfer}" "https://www.automecanik.com$TEST_R1_URL")
          echo "TTFB: ${TTFB}s"
          if (( $(echo "$TTFB > 2.0" | bc -l) )); then
            echo "⚠️ WARNING: TTFB ${TTFB}s exceeds 2s threshold"
            exit 1
          fi
          echo "✅ TTFB: ${TTFB}s (< 2s)"

      - name: 📦 Compression check
        id: compression-check
        continue-on-error: true
        run: |
          HEADERS=$($CADDY_CURL -H "Accept-Encoding: gzip" -I "https://www.automecanik.com$TEST_R1_URL")
          ENCODING=$(echo "$HEADERS" | grep -i "content-encoding:" | head -1)
          if echo "$ENCODING" | grep -qiE "gzip|zstd|br"; then
            echo "✅ Compression: $ENCODING"
          else
            echo "⚠️ No compression detected: '$ENCODING'"
            exit 1
          fi

      - name: 🔒 Security headers
        id: security-check
        continue-on-error: true
        run: |
          HEADERS=$($CADDY_CURL -I "https://www.automecanik.com/")
          FAILED=0

          check_header() {
            local name="$1" pattern="$2"
            local val=$(echo "$HEADERS" | grep -i "^$name:" | head -1)
            if echo "$val" | grep -qi "$pattern"; then
              echo "✅ $name present"
            else
              echo "⚠️ $name missing or unexpected: '$val'"
              FAILED=1
            fi
          }

          check_header "X-Frame-Options" "SAMEORIGIN"
          check_header "X-Content-Type-Options" "nosniff"
          check_header "Referrer-Policy" "strict-origin"

          # Server header should be suppressed
          SERVER=$(echo "$HEADERS" | grep -i "^server:" | head -1)
          if [ -z "$SERVER" ]; then
            echo "✅ Server header: absent (suppressed)"
          else
            echo "⚠️ Server header exposed: $SERVER"
          fi

          if [ "$FAILED" = "1" ]; then exit 1; fi

      - name: 🔴 Redis health
        run: |
          REDIS=$(docker ps --format "{{.Names}} {{.Status}}" | grep "redis_prod" | head -1)
          if [ -z "$REDIS" ]; then
            echo "❌ redis_prod container not found"
            exit 1
          fi
          if echo "$REDIS" | grep -qi "restarting"; then
            echo "❌ redis_prod is crash-looping: $REDIS"
            exit 1
          fi
          echo "✅ Redis: $REDIS"

      - name: 📏 Response size (SSR check)
        run: |
          FAILED=0
          check_size() {
            local url="$1" min="$2" label="$3"
            local size=$(docker exec $CONTAINER wget -qO- "http://localhost:3000$url" 2>/dev/null | wc -c)
            if [ "$size" -lt "$min" ]; then
              echo "❌ $label too small (${size}B < ${min}B) — possible SSR failure"
              FAILED=1
            else
              echo "✅ $label: ${size}B"
            fi
          }

          check_size "$TEST_R1_URL" 20000 "R1 gamme"
          check_size "/blog-pieces-auto/conseils/amortisseur" 10000 "R3 conseil"
          check_size "/blog-pieces-auto/guide-achat/roulement-de-roue" 10000 "R6 guide"

          if [ "$FAILED" = "1" ]; then exit 1; fi

      - name: 🔎 SEO avance (og:image, h1, breadcrumb, preload)
        run: |
          BODY=$(docker exec $CONTAINER wget -qO- "http://localhost:3000$TEST_R1_URL" 2>/dev/null)
          FAILED=0

          # og:image absolute URL
          OG_IMG=$(echo "$BODY" | grep -oP 'property="og:image" content="\K[^"]+' | head -1)
          if echo "$OG_IMG" | grep -q '^https://'; then
            echo "✅ og:image: ${OG_IMG:0:80}..."
          else
            echo "❌ og:image missing or not absolute: '$OG_IMG'"
            FAILED=1
          fi

          # og:image dimensions
          OG_W=$(echo "$BODY" | grep -oP 'property="og:image:width" content="\K[^"]+' | head -1)
          OG_H=$(echo "$BODY" | grep -oP 'property="og:image:height" content="\K[^"]+' | head -1)
          if [ "$OG_W" = "1200" ] && [ "$OG_H" = "630" ]; then
            echo "✅ og:image dimensions: ${OG_W}x${OG_H}"
          else
            echo "❌ og:image dimensions: ${OG_W}x${OG_H} (expected 1200x630)"
            FAILED=1
          fi

          # Exactly 1 <h1> tag
          H1_COUNT=$(echo "$BODY" | grep -c '<h1' || echo "0")
          if [ "$H1_COUNT" = "1" ]; then
            H1_TEXT=$(echo "$BODY" | grep -oP '<h1[^>]*>\K[^<]+' | head -1)
            echo "✅ h1 (x1): ${H1_TEXT:0:60}..."
          elif [ "$H1_COUNT" = "0" ]; then
            echo "❌ No <h1> tag found"
            FAILED=1
          else
            echo "❌ Multiple <h1> tags ($H1_COUNT) — bad for SEO"
            FAILED=1
          fi

          # JSON-LD BreadcrumbList with 3+ items (may be nested in CollectionPage.breadcrumb)
          JSONLD=$(echo "$BODY" | grep -oP 'type="application/ld\+json">\K[^<]+' | head -1)
          BC_RESULT=$(echo "$JSONLD" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          graph=d.get('@graph',[])
          # Check standalone @graph node
          for node in graph:
            if node.get('@type')=='BreadcrumbList':
              print(f'OK:{len(node.get(\"itemListElement\",[]))}')
              sys.exit(0)
          # Check nested in CollectionPage.breadcrumb
          for node in graph:
            bc=node.get('breadcrumb',{})
            if isinstance(bc,dict) and bc.get('@type')=='BreadcrumbList':
              print(f'OK:{len(bc.get(\"itemListElement\",[]))}')
              sys.exit(0)
          print('MISSING')
          " 2>/dev/null || echo "ERROR")
          if echo "$BC_RESULT" | grep -q "^OK:"; then
            COUNT=${BC_RESULT#OK:}
            if [ "$COUNT" -ge 3 ]; then
              echo "✅ BreadcrumbList: $COUNT items"
            else
              echo "❌ BreadcrumbList only $COUNT items (expected 3+)"
              FAILED=1
            fi
          else
            echo "❌ BreadcrumbList missing from JSON-LD"
            FAILED=1
          fi

          # Preload font (woff2)
          FONT_PRELOADS=$(echo "$BODY" | grep -c 'rel="preload".*as="font"' || echo "0")
          if [ "$FONT_PRELOADS" -ge 1 ]; then
            echo "✅ Font preload: $FONT_PRELOADS link(s)"
          else
            echo "❌ No font preload hints"
            FAILED=1
          fi

          # Preload image (logo-navbar)
          if echo "$BODY" | grep -q 'rel="preload".*as="image"'; then
            echo "✅ Image preload present"
          else
            echo "❌ No image preload (logo-navbar)"
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then exit 1; fi
          echo "✅ All SEO avance checks passed"

      - name: 🚫 404/410 handling
        run: |
          FAILED=0

          # Use curl via Caddy (full curl, not BusyBox wget) for error page checks
          # BusyBox wget can't output body/headers on 4xx responses

          # 410 on /pieces/suspension (no ID slug)
          STATUS_410=$($CADDY_CURL -o /dev/null -w "%{http_code}" "https://www.automecanik.com/pieces/suspension")
          if [ "$STATUS_410" = "410" ]; then
            echo "✅ /pieces/suspension -> 410 Gone"
          else
            echo "❌ /pieces/suspension -> HTTP $STATUS_410 (expected 410)"
            FAILED=1
          fi

          # 410 must have X-Robots-Tag noindex header
          HEADERS_410=$($CADDY_CURL -I "https://www.automecanik.com/pieces/suspension")
          if echo "$HEADERS_410" | grep -qi "x-robots-tag.*noindex"; then
            echo "✅ 410 X-Robots-Tag: noindex"
          else
            echo "❌ 410 missing X-Robots-Tag noindex"
            FAILED=1
          fi

          # 404 on unknown URL
          STATUS_404=$($CADDY_CURL -o /dev/null -w "%{http_code}" "https://www.automecanik.com/this-page-does-not-exist-xyz")
          if [ "$STATUS_404" = "404" ]; then
            echo "✅ /this-page-does-not-exist-xyz -> 404"
          else
            echo "❌ /this-page-does-not-exist-xyz -> HTTP $STATUS_404 (expected 404)"
            FAILED=1
          fi

          # 404 body must contain meta robots noindex
          BODY_404=$($CADDY_CURL "https://www.automecanik.com/this-page-does-not-exist-xyz")
          if echo "$BODY_404" | grep -qi 'robots.*noindex'; then
            echo "✅ 404 meta robots noindex present"
          else
            echo "❌ 404 missing meta robots noindex in body"
            FAILED=1
          fi

          # Valid page must NOT have noindex
          BODY_200=$(docker exec $CONTAINER wget -qO- "http://localhost:3000$TEST_R1_URL" 2>/dev/null)
          ROBOTS_200=$(echo "$BODY_200" | grep -oP 'name="robots" content="\K[^"]+' | head -1)
          if echo "$ROBOTS_200" | grep -qi "noindex"; then
            echo "❌ Valid page has robots noindex! '$ROBOTS_200'"
            FAILED=1
          else
            echo "✅ Valid page robots: ${ROBOTS_200:-'index, follow'}"
          fi

          if [ "$FAILED" = "1" ]; then exit 1; fi
          echo "✅ All 404/410 checks passed"

      - name: ⚡ LCP proxy checks
        id: lcp-check
        continue-on-error: true
        run: |
          BODY=$(docker exec $CONTAINER wget -qO- "http://localhost:3000$TEST_R1_URL" 2>/dev/null)
          FAILED=0

          # Server-side response time < 500ms
          START=$(date +%s%N)
          docker exec $CONTAINER wget -qO /dev/null "http://localhost:3000$TEST_R1_URL" 2>/dev/null
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          if [ "$ELAPSED" -lt 500 ]; then
            echo "✅ Server response time: ${ELAPSED}ms (< 500ms)"
          else
            echo "⚠️ Server response time: ${ELAPSED}ms (> 500ms)"
            FAILED=1
          fi

          # Font preload (woff2) — 2 fonts expected
          WOFF2_COUNT=$(echo "$BODY" | grep -c 'rel="preload".*type="font/woff2"' || echo "0")
          if [ "$WOFF2_COUNT" -ge 2 ]; then
            echo "✅ woff2 preload: $WOFF2_COUNT fonts"
          else
            echo "⚠️ Only $WOFF2_COUNT woff2 preloads (expected 2: outfit + dm-sans)"
            FAILED=1
          fi

          # Stylesheet preload
          if echo "$BODY" | grep -q 'rel="preload".*as="style"'; then
            echo "✅ Stylesheet preload present"
          else
            echo "⚠️ No stylesheet preload"
            FAILED=1
          fi

          # SSR HTML size < 300KB (no bloat)
          SIZE=$(echo "$BODY" | wc -c)
          if [ "$SIZE" -lt 300000 ]; then
            echo "✅ HTML size: ${SIZE}B (< 300KB)"
          else
            echo "⚠️ HTML size: ${SIZE}B (> 300KB — possible bloat)"
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then exit 1; fi

      - name: 🛡️ CSP header
        id: csp-check
        continue-on-error: true
        run: |
          HEADERS=$(docker exec $CONTAINER wget --spider -qS "http://localhost:3000$TEST_R1_URL" 2>&1)
          FAILED=0

          # Content-Security-Policy present with nonce
          CSP=$(echo "$HEADERS" | grep -i "content-security-policy" | head -1)
          if [ -z "$CSP" ]; then
            echo "⚠️ Content-Security-Policy header absent"
            FAILED=1
          elif echo "$CSP" | grep -q "nonce-"; then
            echo "✅ CSP present with nonce"
          else
            echo "⚠️ CSP present but no nonce: ${CSP:0:100}..."
            FAILED=1
          fi

          # X-Powered-By must be absent
          POWERED=$(echo "$HEADERS" | grep -i "x-powered-by" | head -1)
          if [ -z "$POWERED" ]; then
            echo "✅ X-Powered-By: absent (good)"
          else
            echo "⚠️ X-Powered-By exposed: $POWERED"
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then exit 1; fi

      - name: 🚀 PageSpeed assertions
        id: pagespeed-check
        continue-on-error: true
        run: |
          FAILED=0

          # --- R1 Page ---
          R1_BODY=$(docker exec $CONTAINER wget -qO- "http://localhost:3000$TEST_R1_URL" 2>/dev/null)

          # fetchPriority="high" on hero image
          if echo "$R1_BODY" | grep -q 'fetchpriority="high"'; then
            echo "✅ R1: fetchPriority=high present"
          else
            echo "⚠️ R1: fetchPriority=high missing on hero image"
            FAILED=1
          fi

          # <picture> with AVIF source
          if echo "$R1_BODY" | grep -q 'type="image/avif"'; then
            echo "✅ R1: AVIF source in <picture>"
          else
            echo "⚠️ R1: No AVIF source found"
            FAILED=1
          fi

          # <picture> with WebP source
          if echo "$R1_BODY" | grep -q 'type="image/webp"'; then
            echo "✅ R1: WebP source in <picture>"
          else
            echo "⚠️ R1: No WebP source found"
            FAILED=1
          fi

          # Outfit font preloaded (V9 design system)
          if echo "$R1_BODY" | grep -q 'href="/fonts/outfit-latin.woff2"'; then
            echo "✅ R1: Outfit font preloaded"
          else
            echo "⚠️ R1: Outfit font not preloaded"
            FAILED=1
          fi

          # Inter font NOT preloaded (removed for perf)
          if echo "$R1_BODY" | grep -q 'rel="preload".*href="/fonts/inter-latin.woff2"'; then
            echo "⚠️ R1: Inter font still preloaded (should be removed)"
            FAILED=1
          else
            echo "✅ R1: Inter font not preloaded (good)"
          fi

          # --- R2 Page ---
          R2_BODY=$(docker exec $CONTAINER wget -qO- "http://localhost:3000$TEST_R2_URL" 2>/dev/null)
          R2_SIZE=$(echo "$R2_BODY" | wc -c)
          if [ "$R2_SIZE" -gt 10000 ]; then
            echo "✅ R2: Page renders (${R2_SIZE}B)"
          else
            echo "⚠️ R2: Page too small (${R2_SIZE}B)"
            FAILED=1
          fi

          # R2 TTFB
          R2_START=$(date +%s%N)
          docker exec $CONTAINER wget -qO /dev/null "http://localhost:3000$TEST_R2_URL" 2>/dev/null
          R2_END=$(date +%s%N)
          R2_MS=$(( (R2_END - R2_START) / 1000000 ))
          if [ "$R2_MS" -lt 1000 ]; then
            echo "✅ R2: Server response ${R2_MS}ms (< 1s)"
          else
            echo "⚠️ R2: Server response ${R2_MS}ms (> 1s)"
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then exit 1; fi

      - name: 🐳 Containers status
        if: always()
        run: |
          echo "=== Container Status ==="
          docker ps --format "table {{.Names}}\t{{.Status}}" | grep -E "nestjs|caddy|imgproxy|redis" || true
          echo ""
          echo "=== imgproxy Memory ==="
          docker stats imgproxy --no-stream --format "{{.Name}}: {{.MemUsage}}" 2>/dev/null || echo "imgproxy not running"

      - name: 📋 Summary
        if: always()
        run: |
          echo "## 🩺 PROD Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cache headers | ${{ steps.cache-check.outcome == 'success' && '✅' || '⚠️ Warning' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TTFB | ${{ steps.ttfb-check.outcome == 'success' && '✅' || '⚠️ Warning' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compression | ${{ steps.compression-check.outcome == 'success' && '✅' || '⚠️ Warning' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security headers | ${{ steps.security-check.outcome == 'success' && '✅' || '⚠️ Warning' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| LCP proxy | ${{ steps.lcp-check.outcome == 'success' && '✅' || '⚠️ Warning' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CSP header | ${{ steps.csp-check.outcome == 'success' && '✅' || '⚠️ Warning' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PageSpeed | ${{ steps.pagespeed-check.outcome == 'success' && '✅' || '⚠️ Warning' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Run: $(date -u '+%Y-%m-%d %H:%M UTC')_" >> $GITHUB_STEP_SUMMARY

      - name: 🔔 Notify Slack on failure
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"🚨 PROD Smoke Test FAILED\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"🚨 *PROD Smoke Test FAILED*\n*Time:* $(date -u '+%Y-%m-%d %H:%M UTC')\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>\"
                  }
                }
              ]
            }"
