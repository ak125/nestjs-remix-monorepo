name: canon-sync

# Generic auto-PR resync of canon mirrors from ak125/governance-vault.
#
# Triggers:
# - repository_dispatch[canon-updated]: fired by vault's canon-publish.yml
#   on every push to main that touches a canon file or canon-hashes.json.
# - schedule (daily 03:00 UTC): defense-in-depth catch-up if dispatch was
#   missed (token expired, transient failure). Runs 30min before the per-canon
#   *-hash.yml verification workflows so any drift is auto-fixed before they
#   run.
# - workflow_dispatch: manual re-run.
#
# Flow:
# 1. scripts/ci/sync-canon-from-vault.sh fetches the vault's canon-hashes.json,
#    iterates over every canon entry whose `consumers[].repo` is this repo,
#    fetches the raw canon file, applies the canonical strip-frontmatter
#    transform, verifies sha256 against `distribution_sha256` (fail-closed),
#    and writes each declared mirror path.
# 2. If any file changed, peter-evans/create-pull-request@v6 opens (or updates)
#    a PR with the resync.
# 3. The PR's own CI (marketing-voice-hash.yml, agent-exit-contract-hash.yml)
#    verifies the bytes match the vault on every push to the mirror paths.
#
# Generic-by-design: adding a new canon to the vault's CANONS registry
# (see governance-vault/_scripts/compute-canon-hashes.py) requires ZERO
# changes in this monorepo. The script auto-discovers consumers from
# canon-hashes.json.

on:
  repository_dispatch:
    types: [canon-updated]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: canon-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync canon mirrors from vault
        run: bash scripts/ci/sync-canon-from-vault.sh

      - name: Open (or update) auto-PR if mirrors changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: canon-sync/auto
          commit-message: "chore(canon): resync mirrors from governance-vault"
          title: "chore(canon): resync mirrors from governance-vault"
          body: |
            Auto-generated by `.github/workflows/canon-sync.yml`.

            Trigger: ${{ github.event_name }}${{ github.event.action && format(' ({0})', github.event.action) || '' }}

            The script `scripts/ci/sync-canon-from-vault.sh` reads
            `99-meta/canon-hashes.json` from `ak125/governance-vault@main`,
            applies the canonical strip-frontmatter transform to each canon
            file, and writes the bytes to every declared mirror in this repo.

            **Verification :**
            - The sync script is fail-closed: it aborts before touching any
              mirror file if the produced sha256 does not match
              `distribution_sha256`.
            - On merge, the per-canon `*-hash.yml` workflows re-verify the
              bytes against the vault (defense-in-depth).

            **No manual edit needed** — review the diff, ensure CI green,
            and merge.
          delete-branch: true
          labels: |
            canon-sync
            automated
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
