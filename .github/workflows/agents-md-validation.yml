name: agents-md-validation

# Aucun `paths` filter : le workflow tourne sur CHAQUE PR + push main.
# Justification (P1 vault `audit-claude-md-agents-md-validator-20260503.md`) :
#   - paths-filtered + required-check → PR ne touchant aucun path → check
#     « expected mais missing » → blocage merge silencieux (cf. PR #273 BEHIND).
#   - Le validateur lui-même est ultra-rapide (<10s total) sur un diff vide :
#     `--diff` retourne 0 fichier scanné → exit 0 PASS, `--all` retourne 0 BLOCK.
#   - Pas de coût CI significatif : shellcheck (~1s) + self-test (~1s) +
#     diff (<1s sur diff vide) + all (~6s sur les 11 AGENTS.md/CLAUDE.md).
# Si `agents-md-validation` est ajouté un jour aux required checks de
# `branches/main/protection`, ce design empêche le piège paths-filter.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate AGENTS.md / CLAUDE.md
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for git diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # OBLIGATOIRE — sans ça `git diff origin/main` retourne vide

      - name: Lint validator with shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: 'scripts/agents'
          severity: error

      - name: Self-test validator
        run: bash scripts/agents/validate-agents-md.sh --self-test

      - name: Validate diff vs base (anti-patterns sur lignes ajoutées)
        if: github.event_name == 'pull_request'
        # Use base.sha (unambiguous) au lieu de origin/<base_ref> :
        # sur une PR forkée externe, `origin` peut pointer vers le fork
        # → `git diff origin/main` retournerait vide silencieusement (gate passerait à tort).
        run: bash scripts/agents/validate-agents-md.sh --diff ${{ github.event.pull_request.base.sha }}

      - name: Validate full repo (structure check)
        run: bash scripts/agents/validate-agents-md.sh --all
