name: 🛡️ Audit gates (Phase 0)

# Deterministic codebase audits : knip + madge + dependency-cruiser + ast-grep.
# Phase 0 posture : warning-mode, ast-grep is the only gate that blocks the PR
# (and only on `severity: error` rules). knip / madge / depcruise print signals
# but never fail the run — they are informational until Phase 1 cleanup ships.
#
# Regression gate (added Phase 0.5): audit-compare-baseline.js compares counts
# against audit-reports/phase0-baseline.json and BLOCKS the PR if any metric
# exceeds its threshold. Going down (negative delta) is always allowed.

on:
  pull_request:
    paths:
      - "backend/src/**"
      - "frontend/app/**"
      - "packages/**"
      - "scripts/**"
      - ".ast-grep/**"
      - "knip.json"
      - ".dependency-cruiser.cjs"
      - "sgconfig.yml"
      - "**/package.json"   # root + backend/ + frontend/ + all workspaces (was root-only -> #1052 skip)
      - "package-lock.json"
      - "audit-reports/phase0-baseline.json"
      - ".github/workflows/audit.yml"
      - ".spec/00-canon/repository-registry/**"   # ALL L2 overlays the contract suite reads (was architecture+db only)
      - "audit/registry/**"                        # L1 projections the contract tests assert against
      - ".dependency-cruiser.generated.cjs"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: 🛡️ Deterministic gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: 🎯 ast-grep scan (rule-pattern guard — blocks on severity:error)
        run: npm run audit:ast

      - name: 🧪 RAG-read authority rule — RED/GREEN fixtures (BLOCKING)
        # Proves seo-no-rag-as-content-source discriminates a RAG→editorial-sink
        # writer (RED, must match) from a chatbot/retrieval consumer (GREEN, never
        # matches). Guards the rule's meaning as B1..B8 close (plan §Fermeture B3).
        run: npm run audit:rag-authority-rule:test

      - name: 🗂️ EDITORIAL_AUTHORITY_SINKS registry invariants (BLOCKING)
        # Pins the exact P0 sink set (audit §6): 2 served-tracked + 15 ratchet-blind,
        # each evidence-linked, no rN wildcard. The blind rows justify the registry.
        run: npm run audit:editorial-sinks:test

      - name: 🧊 RAG-authority-read ratchet — comparator unit tests (BLOCKING)
        run: npm run audit:rag-authority-read-ratchet:test

      - name: 🧊 RAG-authority-read ratchet — freeze known B1..B8 debt (BLOCKING)
        # The rule is `warning` (a scan alone exits 0 on the 25-finding debt). This
        # ratchet fails on ANY drift vs the frozen baseline: +findings, a new file, a
        # reappeared writer path, or a reduction not accompanied by a same-PR refresh.
        # CI MUST NEVER call --refresh (maintainer-only). Makes `warning` a real gate.
        run: npm run audit:rag-authority-read-ratchet

      - name: 🪪 Diagnostic engine boundary (PR-D, BLOCKING)
        # Engines under backend/src/modules/diagnostic-engine/engines/ must not
        # cross-import sibling modules — only via ports/ (canon PR-A.1
        # ddd-bounded-contexts-anti-god-engine). Allowlist for V1 grandfathered
        # imports lives inline in the script.
        run: bash scripts/governance/check-diagnostic-engine-boundary.sh

      - name: 🔁 madge — circular dependencies (informational)
        if: always()
        continue-on-error: true
        run: npm run audit:madge

      - name: 🏛️ Architecture contract — regenerate artifacts
        if: always()
        run: npm run architecture:build

      - name: 🗄️ DB contract — regenerate IDE schema mirror (PR-3a)
        # Mirror of architecture:build pattern. Pure regen — if Zod parse
        # throws, that surfaces a real bug in db.yaml. No committed artifact
        # in PR-3a; PR-3b will add the artifact + freshness gate.
        if: always()
        run: npm run db-contract:build

      - name: 🚦 Runtime contract — regenerate IDE schema mirror (PR-5)
        # Mirror of architecture:build / db-contract:build pattern. Pure regen
        # of .spec/00-canon/_schema/runtime-topology.schema.json (gitignored).
        # If Zod parse / cross-contract test fails, surfaces a real bug in
        # runtime-topology.yaml. No committed artifact; no freshness gate yet
        # — PR-5b will introduce the projection layer + freshness gate.
        # The @repo/registry test step below (warn-only via PR-W3 #512) picks
        # up the new runtime-contract.test.ts cases automatically.
        if: always()
        run: npm run runtime-contract:build

      - name: 📦 Dep governance — regenerate IDE schema mirror (PR-D)
        # Mirror of runtime-contract:build pattern. Pure regen of
        # .spec/00-canon/_schema/dep-governance.schema.json (gitignored).
        # If Zod parse / cross-contract test fails, surfaces a real bug in
        # dep-governance.yaml. No committed artifact; no freshness gate yet
        # — V2 may add a license/version-policy contract + gate.
        # The @repo/registry test step below (warn-only via PR-W3 #512) picks
        # up the new dep-governance-contract.test.ts cases automatically.
        if: always()
        run: npm run dep-governance:build

      - name: 🔌 RPC contract — regenerate IDE schema mirror (PR-R)
        # Mirror of dep-governance:build pattern. Pure regen of
        # .spec/00-canon/_schema/rpc.schema.json (gitignored). If Zod parse /
        # cross-contract test fails, surfaces a real bug in rpc.yaml. No
        # committed artifact; no freshness gate yet — V2 may add SECURITY
        # DEFINER deep audit + signature contract + gate.
        # The @repo/registry test step below (warn-only via PR-W3 #512) picks
        # up the new rpc-contract.test.ts cases automatically.
        if: always()
        run: npm run rpc-contract:build

      # PROMOTED to BLOCKING gate by PR-W3b (2026-05-14).
      # Trigger satisfied: 27 green PR audit.yml runs since PR-W3 #512 wired this
      # step (2026-05-14T13:06), 0 flaky observed across 5 contracts shipped today
      # (PR-2 #507 architecture, PR-3a #511 db, PR-5 #519 runtime, PR-D #523
      # dep-governance, PR-R #526 rpc). 76 test cases total — all proven stable.
      #
      # If a future PR breaks any registry contract test → CI fails red → PR
      # blocked until fix. Industry-standard CI ratchet pattern (warm-up → blocking).
      - name: 📋 @repo/registry contract tests (5 contracts, BLOCKING)
        if: always()
        run: npm -w @repo/registry test

      # PROMOTED to BLOCKING gate by PR-3b (2026-05-14).
      # Trigger satisfied: 27+ green PR audit.yml runs since PR-2 #507 wired
      # architecture.yaml + .dependency-cruiser.generated.cjs (architecture
      # contract has been stable, no drift observed across 5 contracts shipped
      # this week + 7 recent SEO/RPC PRs touching audit.yml). Mirror PR-W3b
      # ratchet pattern shipped in #530 (commit 1435f836).
      #
      # If a future PR modifies architecture.yaml without rebuilding +
      # committing .dependency-cruiser.generated.cjs → CI fails red → PR
      # blocked until fix. Industry-standard "commit-the-generated-artifact"
      # pattern.
      - name: 🏛️ Architecture contract — freshness gate (BLOCKING)
        if: always()
        run: |
          # Drift detection: .dependency-cruiser.generated.cjs is tracked
          # (architecture.schema.json is gitignored, regenerated each run).
          if ! git diff --exit-code .dependency-cruiser.generated.cjs; then
            echo "::error::.dependency-cruiser.generated.cjs is stale. Run 'npm run architecture:build' and commit."
            exit 1
          fi

      - name: 🏛️ dependency-cruiser — architectural rules (informational)
        if: always()
        continue-on-error: true
        run: npm run audit:depcruise

      - name: 🧹 knip — unused files / exports / deps (informational)
        if: always()
        continue-on-error: true
        run: npm run audit:knip

      - name: 🚨 Baseline regression gate (BLOCKING)
        if: always()
        run: npm run audit:baseline

      - name: 📋 Baseline reminder
        if: always()
        run: |
          echo ""
          echo "=================================================="
          echo "Phase 0 baseline   : audit-reports/phase0-baseline.md"
          echo "Regression gate    : audit-reports/phase0-baseline.json"
          echo ""
          echo "ast-grep runs BLOCKING on rules with severity: error."
          echo "Baseline gate BLOCKS when deltas exceed configured thresholds."
          echo "knip / madge / depcruise are warning-only for now."
          echo "Promote to blocking after Phase 1 cleanup lands."
          echo "=================================================="
