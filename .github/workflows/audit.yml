name: 🛡️ Audit gates (Phase 0)

# Deterministic codebase audits : knip + madge + dependency-cruiser + ast-grep.
# Phase 0 posture : warning-mode, ast-grep is the only gate that blocks the PR
# (and only on `severity: error` rules). knip / madge / depcruise print signals
# but never fail the run — they are informational until Phase 1 cleanup ships.
#
# Regression gate (added Phase 0.5): audit-compare-baseline.js compares counts
# against audit-reports/phase0-baseline.json and BLOCKS the PR if any metric
# exceeds its threshold. Going down (negative delta) is always allowed.

on:
  pull_request:
    paths:
      - "backend/src/**"
      - "frontend/app/**"
      - "packages/**"
      - "scripts/**"
      - ".ast-grep/**"
      - "knip.json"
      - ".dependency-cruiser.cjs"
      - "sgconfig.yml"
      - "package.json"
      - "package-lock.json"
      - "audit-reports/phase0-baseline.json"
      - ".github/workflows/audit.yml"
      - ".spec/00-canon/repository-registry/architecture.yaml"
      - ".spec/00-canon/repository-registry/db.yaml"
      - ".dependency-cruiser.generated.cjs"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: 🛡️ Deterministic gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: 🎯 ast-grep scan (rule-pattern guard — blocks on severity:error)
        run: npm run audit:ast

      - name: 🔁 madge — circular dependencies (informational)
        if: always()
        continue-on-error: true
        run: npm run audit:madge

      - name: 🏛️ Architecture contract — regenerate artifacts
        if: always()
        run: npm run architecture:build

      - name: 🗄️ DB contract — regenerate IDE schema mirror (PR-3a)
        # Mirror of architecture:build pattern. Pure regen — if Zod parse
        # throws, that surfaces a real bug in db.yaml. No committed artifact
        # in PR-3a; PR-3b will add the artifact + freshness gate.
        if: always()
        run: npm run db-contract:build

      # RATCHET DEADLINE — mechanical expiration via env var + date check.
      # After the deadline, the STEP fails visibly (red ✘ in the CI summary, ::error::
      # in the log), but the WORKFLOW still passes because `continue-on-error: true` is
      # V1. The visible failure is the social signal forcing PR-W3b to land. PR-W3b
      # removes `continue-on-error: true` to make this gate workflow-blocking.
      #
      # TODO_REMOVE_IN: PR-W3b
      #   - Delete `continue-on-error: true` below.
      #   - Delete the `REGISTRY_TESTS_WARN_ONLY_UNTIL` env block.
      #   - Delete the date-check `if` line in the run script.
      #   Refusing this PR after the deadline means knowingly accepting permanent dead code.
      - name: 📋 @repo/registry contract tests (architecture + db, warn-only)
        if: always()
        continue-on-error: true
        env:
          REGISTRY_TESTS_WARN_ONLY_UNTIL: "2026-06-15"
        run: |
          # 1) Mechanical ratchet — after the deadline, the step fails visibly.
          if [ "$(date +%F)" \> "$REGISTRY_TESTS_WARN_ONLY_UNTIL" ]; then
            echo "::error::warn-only deadline ($REGISTRY_TESTS_WARN_ONLY_UNTIL) expired — open PR-W3b to remove continue-on-error: true and make this gate workflow-blocking."
            exit 2
          fi

          # 2) Run the workspace test suite (node:test via tsx).
          npm -w @repo/registry test

      # RATCHET DEADLINE — mechanical expiration via env var + date check.
      # After the deadline, the STEP fails visibly (red ✘ in the CI summary, ::error::
      # in the log), but the WORKFLOW still passes because `continue-on-error: true` is
      # V1. The visible failure is the social signal forcing PR-3b to land. PR-3b removes
      # `continue-on-error: true` to make this gate workflow-blocking.
      # ADRs/comments without auto-expiration always become permanent dead code; the
      # env-var + date check makes the deadline executable instead of decorative.
      #
      # TODO_REMOVE_IN: PR-3b
      #   - Delete `continue-on-error: true` below.
      #   - Delete the `ARCH_CONTRACT_WARN_ONLY_UNTIL` env block.
      #   - Delete the date-check `if` in the run script.
      #   Tracked in: ADR-058 § "Ratchet schedule".
      #   Refusing this PR after the deadline means knowingly accepting permanent dead code.
      - name: 🏛️ Architecture contract — freshness gate (warn-only until ARCH_CONTRACT_WARN_ONLY_UNTIL)
        if: always()
        continue-on-error: true
        env:
          ARCH_CONTRACT_WARN_ONLY_UNTIL: "2026-05-28"
        run: |
          # 1) Mechanical ratchet — after the deadline, the step fails visibly.
          #    The workflow still passes (V1 has continue-on-error: true), but the red
          #    step + ::error:: annotation make the missing PR-3b impossible to miss.
          if [ "$(date +%F)" \> "$ARCH_CONTRACT_WARN_ONLY_UNTIL" ]; then
            echo "::error::warn-only deadline ($ARCH_CONTRACT_WARN_ONLY_UNTIL) expired — open PR-3b to remove continue-on-error: true and make this gate workflow-blocking."
            exit 2
          fi

          # 2) Drift detection: only .dependency-cruiser.generated.cjs is tracked.
          #    architecture.schema.json is gitignored (regenerated each run for IDE).
          if ! git diff --exit-code .dependency-cruiser.generated.cjs; then
            echo "::warning::.dependency-cruiser.generated.cjs is stale. Run 'npm run architecture:build' and commit."
            exit 1
          fi

      - name: 🏛️ dependency-cruiser — architectural rules (informational)
        if: always()
        continue-on-error: true
        run: npm run audit:depcruise

      - name: 🧹 knip — unused files / exports / deps (informational)
        if: always()
        continue-on-error: true
        run: npm run audit:knip

      - name: 🚨 Baseline regression gate (BLOCKING)
        if: always()
        run: npm run audit:baseline

      - name: 📋 Baseline reminder
        if: always()
        run: |
          echo ""
          echo "=================================================="
          echo "Phase 0 baseline   : audit-reports/phase0-baseline.md"
          echo "Regression gate    : audit-reports/phase0-baseline.json"
          echo ""
          echo "ast-grep runs BLOCKING on rules with severity: error."
          echo "Baseline gate BLOCKS when deltas exceed configured thresholds."
          echo "knip / madge / depcruise are warning-only for now."
          echo "Promote to blocking after Phase 1 cleanup lands."
          echo "=================================================="
