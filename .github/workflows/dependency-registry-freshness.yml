name: 🔒 Dependency registry truth freshness

# Dependency-registry truth gate — ADR-058 Repository Control Plane, Layer 1.
# TWO ORTHOGONAL PROOFS, one verdict, WARN-ONLY FIRST (ADR-062, see ROLLOUT):
#   • CHECK 1 — semantic FIDELITY (Proof A): an INDEPENDENT scan of the live
#     package.json manifests, compared tuple-for-tuple to
#     flatten(deps.json.occurrences). Catches a WRONG producer (mis-paired
#     provenance, dropped bucket) — which the git-diff below cannot, because it
#     re-runs that same producer. `scripts/registry/validate-deps-fidelity.ts`.
#   • CHECK 2 — FRESHNESS (Proof B): `committed deps.json == rebuild(manifests)`
#     via `git diff --exit-code`. Catches a STALE artifact (dep bumped, registry
#     not regenerated). This is NOT replaced by Check 1 — the two guard
#     different defect classes (stale artifact vs wrong producer).
#
# WHY THIS EXISTS
# ---------------
# The L1 dependency registry `audit/registry/deps.json` is generated by
# `scripts/registry/build-deps-registry.js`, which reads the live workspace
# `package.json` manifests. When a dependency is bumped (e.g. Nest 10→11,
# React Router 7→8, Vite 7→8, Zod 3→4) but `deps.json` is not regenerated,
# L1 silently drifts from reality. Because the L2 overlay
# `.spec/00-canon/repository-registry/dep-governance.yaml` is contract-tested
# against L1 (not against the manifests), L1 and L2 can drift TOGETHER and
# stay mutually consistent — "green but wrong". The existing
# `registry-build.yml` only proves the builder is deterministic (it is
# `continue-on-error: true`, warn-only) and does NOT trigger on the
# backend/frontend/packages manifests, so it cannot catch this.
#
# WHAT THIS GATE DOES
# -------------------
# CHECK 1 (fidelity) builds a tuple set DIRECTLY from the manifests and asserts
# it equals flatten(deps.json.occurrences) — the producer is correct. CHECK 2
# (freshness) rebuilds `deps.json` and flags drift when the committed file
# differs — the artifact is current (`committed L1 == fresh(manifests)`).
# Together they are the missing closure between the primary source
# (`package.json`) and its executable projection (`deps.json`): fidelity ≠
# freshness — a deterministic-but-wrong producer regenerating a wrong artifact
# passes Check 2 but fails Check 1. Under the ADR-062 ratchet both are warn-only
# first (non-blocking) — see ROLLOUT below.
# Ref: audit/p0-rag-runtime-and-version-truth-2026-07-04.md §3.1
#
# ROLLOUT — WARN-ONLY FIRST (ADR-062 ratchet)
# -------------------------------------------
# Per ADR-062, no new gate starts blocking. This job carries
# `continue-on-error: true` at the JOB level: the drift DETECTION below stays
# intact (the assert step still `exit 1`s, with a red step, an `::error`
# annotation, and a $GITHUB_STEP_SUMMARY explanation), but a failing job does
# NOT block the PR — it is a visible, non-blocking signal.
#
# WHY warn-only first: on a drifted repo this gate is RED BY DESIGN until
# `deps.json` is rebuilt (PR-B) AND the owner-gated L2 `dep-governance.yaml`
# is resynced (so the @repo/registry §4.2 subset test in `contract-gate.yml`
# stays green). Landing it blocking now would wedge every unrelated PR.
#
# PROMOTION TO BLOCKING — remove `continue-on-error` AND add this as a REQUIRED
# status check in branch protection — only after ALL of:
#   1. PR-B has rebuilt `audit/registry/deps.json` from the live manifests;
#   2. the owner-gated L2 `dep-governance.yaml` is resynced (contract-gate green);
#   3. the gate has been observed GREEN on `main` for the ADR-062 ratchet
#      window (>= 10 consecutive green builds / ~7-14 days), no false positive.
# Flipping earlier requires a vault derogation ADR.

on:
  pull_request:
    branches: [main]
    paths:
      - "package.json"
      - "backend/package.json"
      - "frontend/package.json"
      - "packages/*/package.json"
      - "package-lock.json"
      - "scripts/registry/build-deps-registry.js"
      - "scripts/registry/validate-deps-fidelity.ts"
      - "scripts/registry/lib/**"
      - "audit/registry/deps.json"
      - ".github/workflows/dependency-registry-freshness.yml"
  push:
    branches: [main]
    paths:
      - "package.json"
      - "backend/package.json"
      - "frontend/package.json"
      - "packages/*/package.json"
      - "package-lock.json"
      - "scripts/registry/build-deps-registry.js"
      - "scripts/registry/validate-deps-fidelity.ts"
      - "scripts/registry/lib/**"
      - "audit/registry/deps.json"
      - ".github/workflows/dependency-registry-freshness.yml"

permissions:
  contents: read

jobs:
  deps-freshness:
    name: deps.json == fresh(manifests)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    # ADR-062 ratchet — WARN-ONLY FIRST. The assert step below still exits 1 on
    # drift (detection intact), but this job-level flag prevents that failure
    # from blocking the PR. Remove this line to promote to blocking (see ROLLOUT).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # CHECK 1 — semantic FIDELITY (Proof A). Independent manifest scan vs
      # flatten(deps.json.occurrences) + 4 structural invariants. The validator
      # imports only Node built-ins + scripts/registry/lib/utils.js (zero
      # third-party runtime deps), so `npx tsx` runs it standalone — no `npm ci`
      # needed, keeping the gate fast. Nest/RR/Zod are priority diagnostics;
      # NO expected version is hardcoded (truth = the live manifests).
      - name: "Check 1 — semantic fidelity (deps.json == manifests, tuple-for-tuple)"
        run: npx --yes tsx@4 scripts/registry/validate-deps-fidelity.ts

      # CHECK 2 — FRESHNESS (Proof B). The deps builder is pure Node
      # (fs/path/crypto) and reads the package.json manifests directly, so no
      # `npm ci` is required — this keeps the freshness gate fast (~seconds).
      - name: Rebuild L1 deps registry from live manifests
        run: npm run registry:build:deps

      - name: "Check 2 — freshness (committed deps.json == fresh build; fail on drift)"
        run: |
          if git diff --exit-code -- audit/registry/deps.json; then
            echo "✓ audit/registry/deps.json matches a fresh build from the workspace manifests."
          else
            {
              echo "## ❌ deps.json is STALE vs the workspace package.json manifests"
              echo ""
              echo "The committed L1 dependency registry does not equal a fresh build."
              echo "A dependency was changed in a package.json without regenerating deps.json."
              echo ""
              echo "**Fix:** run \`npm run registry:build:deps\` then commit \`audit/registry/deps.json\`."
              echo "If the owner-gated L2 overlay \`dep-governance.yaml\` still pins now-removed"
              echo "versions, resync it too (owner PR) so \`contract-gate.yml\` stays green."
              echo ""
              echo "Doctrine: dependency truth must stay derived from the manifests."
              echo "See audit/p0-rag-runtime-and-version-truth-2026-07-04.md §3.1."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error file=audit/registry/deps.json::deps.json is stale vs package.json manifests — run 'npm run registry:build:deps' and commit."
            exit 1
          fi
