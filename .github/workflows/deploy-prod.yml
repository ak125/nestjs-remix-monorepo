name: 🚀 Deploy PROD (via tag)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      break_glass_no_rollback_point:
        description: >-
          BREAK-GLASS. Deploy even though no PROD container is running, i.e. with
          NO rollback point. Only legitimate for a first deploy or a host rebuild.
          On an existing PROD, a missing container means something is already
          wrong — deploying blind would leave no way back.
        type: boolean
        default: false

# A PROD deploy mutates shared, external state (the :production tag + the running
# container). Two tags racing would interleave their rollback points: run B could
# capture the image A just installed — or capture nothing — and "rollback" would
# then restore the wrong build. Serialize them, and NEVER cancel a run mid-deploy:
# a cancelled deploy can leave PROD stopped, or leave :production pushed with no
# container behind it.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-prod:
    name: 🚀 Deploy to PROD
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 💾 Capture rollback point — current PROD image ID (BEFORE any :production mutation)
        env:
          # Break-glass escape hatch. `inputs.*` is empty on a tag push, so the
          # repo variable is the tag-push path. Read via env (never interpolated
          # into the script body) so no expression value can be executed.
          BREAK_GLASS: ${{ inputs.break_glass_no_rollback_point || vars.PROD_BREAK_GLASS_NO_ROLLBACK_POINT }}
        run: |
          # ⚠️ Ordering is load-bearing. This step MUST stay before the safety gate.
          #
          # The previous rollback was a proven NO-OP: the safety gate below retags
          # `:production` to the NEW image, and the deploy step then derived
          # `production-previous` FROM `:production` — so `production-previous`
          # WAS the new image, and "rolling back" re-deployed the broken build.
          # (`CURRENT_IMAGE` was computed there, echoed, and never used.)
          #
          # Fix: capture the RUNNING container's IMMUTABLE image ID here, while
          # `:production` still points at the live build, then pin it in the job
          # env so every later step rolls back to a byte-exact known-good image.
          # Retagging `:production` does not mutate a running container's image
          # ID, but capturing before any mutation keeps the invariant obvious.
          set -uo pipefail

          CURRENT_IMAGE=$(docker inspect --format='{{.Image}}' nestjs-remix-monorepo-prod 2>/dev/null || echo "")

          if [ -z "$CURRENT_IMAGE" ]; then
            # No running container on an EXISTING PROD is itself an anomaly
            # (crashed? half-deployed?). Deploying from here would mutate
            # :production with NO way back — fail-closed BEFORE any mutation
            # rather than discover it once the runtime is already broken.
            if [ "${BREAK_GLASS:-}" != "true" ]; then
              echo "❌ FATAL: no running nestjs-remix-monorepo-prod container — no rollback point can be captured."
              echo ""
              echo "  Deploying now would mutate :production with NO way back."
              echo "  Nothing has been mutated yet; PROD is untouched."
              echo ""
              echo "  If this is a FIRST deploy or a host rebuild (i.e. there is legitimately"
              echo "  nothing to roll back to), re-run deliberately in break-glass mode:"
              echo "    - Actions → 'Deploy PROD (via tag)' → Run workflow → break_glass_no_rollback_point = true"
              echo "    - or set repo variable PROD_BREAK_GLASS_NO_ROLLBACK_POINT=true for a tag push"
              echo ""
              echo "  Otherwise investigate why PROD is not running before deploying over it."
              exit 1
            fi
            echo "::warning::BREAK-GLASS: no PROD container and no rollback point — deploying blind on explicit operator request. Auto-rollback is DISABLED for this run."
            echo "ROLLBACK_IMAGE_ID=" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "🔒 Current PROD container image ID : $CURRENT_IMAGE"
          docker tag "$CURRENT_IMAGE" massdoc/nestjs-remix-monorepo:production-previous

          # Push it as an off-box recovery point. Best-effort: the local tag and
          # the pinned ID below are what the in-job rollback actually uses, so a
          # registry hiccup must not abort a deploy.
          if docker push massdoc/nestjs-remix-monorepo:production-previous; then
            echo "📤 production-previous pushed (off-box recovery point)"
          else
            echo "::warning::Could not push production-previous — local tag + pinned ID remain available for in-job rollback"
          fi

          echo "ROLLBACK_IMAGE_ID=$CURRENT_IMAGE" >> "$GITHUB_ENV"

      - name: 🔒 Safety gate — SHA consistency (preprod image ↔ tag commit)
        run: |
          # Le tag git pointe sur un commit précis. L'image :preprod est un alias
          # flottant qui peut encore contenir un build antérieur (cas typique :
          # push main → tag v* avant que le build preprod post-merge ait terminé).
          # Cette étape fail-fast si mismatch, pour empêcher la classe de bug
          # "promote une image obsolète" (incident 2026-04-21 INC-2026-006).
          set -euo pipefail

          echo "📦 Pulling preprod image..."
          docker pull massdoc/nestjs-remix-monorepo:preprod

          # Le commit pointé par le tag git
          TAG_SHA="${GITHUB_SHA}"
          echo "🏷️ Tag commit SHA      : $TAG_SHA"

          # Le SHA inscrit par build.yml dans le label OCI de l'image :preprod
          IMAGE_SHA=$(docker inspect massdoc/nestjs-remix-monorepo:preprod \
            --format='{{ index .Config.Labels "org.opencontainers.image.revision" }}' \
            2>/dev/null || echo "")
          echo "🐳 Preprod image SHA    : ${IMAGE_SHA:-<unset>}"

          if [ -z "$IMAGE_SHA" ]; then
            # Was tolerated for images built before build.yml started labelling
            # (pré 2026-04-21). That grace period self-declared its own expiry
            # ("si ce message apparaît après le 2026-05-01, c'est un bug") and is
            # now long past, so the tolerance is REMOVED: an unlabelled image is
            # an image whose provenance cannot be proven, and promoting an
            # unprovable image to PROD is exactly the class of bug this gate
            # exists to stop (INC-2026-006).
            echo ""
            echo "❌ FATAL: l'image :preprod n'a AUCUN label OCI revision."
            echo ""
            echo "  Impossible de prouver que cette image correspond au commit du tag ($TAG_SHA)."
            echo "  La tolérance historique (images pré-2026-04-21) est retirée — voir audit"
            echo "  2026-07-16 : promouvoir une image de provenance non vérifiable = INC-2026-006."
            echo ""
            echo "Remède :"
            echo "  1. Re-builder :preprod depuis le commit $TAG_SHA (merge/re-run du workflow PREPROD)"
            echo "  2. OU promouvoir explicitement l'image :sha-$TAG_SHA"
            echo ""
            exit 1
          elif [ "$IMAGE_SHA" != "$TAG_SHA" ]; then
            echo ""
            echo "❌ FATAL: l'image :preprod ne correspond PAS au commit du tag."
            echo ""
            echo "  Tag $GITHUB_REF_NAME pointe sur $TAG_SHA"
            echo "  Mais :preprod contient $IMAGE_SHA"
            echo ""
            echo "Cause probable :"
            echo "  - Le build preprod déclenché par le merge de ce commit n'a pas encore terminé."
            echo "  - OU un build préprod a échoué sans re-publier :preprod."
            echo ""
            echo "Remède :"
            echo "  1. Attendre que le workflow 'Deploy PREPROD' pour le commit $TAG_SHA soit ✅"
            echo "  2. OU supprimer ce tag et le re-créer après : git tag -d X && git push --delete origin X"
            echo "  3. OU utiliser l'image explicite :sha-$TAG_SHA (prochaine étape de ce job)"
            exit 1
          else
            echo "✅ SHA match — safe to promote"
          fi

          echo "🏷️ Tagging as production..."
          docker tag massdoc/nestjs-remix-monorepo:preprod massdoc/nestjs-remix-monorepo:production
          docker tag massdoc/nestjs-remix-monorepo:preprod massdoc/nestjs-remix-monorepo:${{ github.ref_name }}

          echo "📤 Pushing to registry..."
          docker push massdoc/nestjs-remix-monorepo:production
          docker push massdoc/nestjs-remix-monorepo:${{ github.ref_name }}

      - name: 🚀 Deploy to PROD
        env:
          NODE_ENV: production
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Optional override. If unset, the value already present in the PROD
          # .env is used (REQUIRED_VARS below guarantees it exists).
          JWT_SECRET_OVERRIDE: ${{ secrets.PROD_JWT_SECRET }}
          # Optional. When set, activates the seo-control-plane synthetic-crawler
          # rate-limit exemption on PROD (HMAC verifier side). Unset = stays OFF
          # (probes throttled; in-app 429-rate alert fires). PR #1141 / #1142.
          SEO_CP_SYNTHETIC_PROBE_SECRET_OVERRIDE: ${{ secrets.PROD_SEO_CP_SYNTHETIC_PROBE_SECRET }}
          # Optional defense-in-depth FLOOR (synthetic-probe egress floor, 2026-06-26): comma-separated egress
          # IP/CIDR(s) of the synthetic probe. cf-connecting-ip is always forwarded
          # by Cloudflare (unlike the HMAC header, which the CDN can strip — root
          # cause of the 2026-06-25 self-throttle), so this keeps the exemption
          # working even if the header never reaches origin. Unset = floor stays
          # OFF (fail-closed; HMAC path only). The value is a public egress IP, NOT a
          # credential — so it lives as a GitHub Actions *variable* (vars), which is
          # readable/verifiable (`gh variable list`), unlike the write-only HMAC secret
          # above. cf-connecting-ip is anti-spoofed at origin, so exposing the IP is safe.
          SEO_CP_SYNTHETIC_PROBE_EGRESS_IPS_OVERRIDE: ${{ vars.PROD_SEO_CP_SYNTHETIC_PROBE_EGRESS_IPS }}
        run: |
          docker pull massdoc/nestjs-remix-monorepo:production

          PROD_DIR=~/production
          mkdir -p $PROD_DIR/config/caddy

          # Sync configs
          rm -f $PROD_DIR/docker-compose.prod.yml $PROD_DIR/docker-compose.caddy.yml $PROD_DIR/docker-compose.imgproxy.yml
          cp $GITHUB_WORKSPACE/docker-compose.prod.yml $PROD_DIR/
          cp $GITHUB_WORKSPACE/docker-compose.caddy.yml $PROD_DIR/
          cp $GITHUB_WORKSPACE/docker-compose.imgproxy.yml $PROD_DIR/
          cp $GITHUB_WORKSPACE/config/caddy/Caddyfile $PROD_DIR/config/caddy/

          cd $PROD_DIR

          # Valider .env
          echo "🔍 Validating production .env file..."
          if [ ! -f ".env" ]; then
            echo "❌ FATAL: .env file missing at $PROD_DIR/.env"
            exit 1
          fi
          source .env
          # JWT_SECRET required since PR #606 (VehicleContextService does
          # configService.getOrThrow('JWT_SECRET') at construction — missing
          # value = crash boot, not a graceful skip). Listed here so a missing
          # value fails fast with a readable message instead of an opaque
          # container crash + failed auto-rollback (incident 2026-05-20).
          REQUIRED_VARS="SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY SYSTEMPAY_SITE_ID PAYBOX_SITE PAYBOX_HMAC_KEY PAYBOX_CALLBACK_MODE SESSION_SECRET JWT_SECRET"
          for var in $REQUIRED_VARS; do
            if [ -z "${!var}" ]; then
              echo "❌ FATAL: Missing required env var: $var"
              exit 1
            fi
          done
          echo "✅ All required environment variables present"

          # Inject Supabase keys from GitHub Secrets (overrides .env values)
          if [ -n "$SUPABASE_SECRET_KEY" ]; then
            sed -i "s|^SUPABASE_SERVICE_ROLE_KEY=.*|SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SECRET_KEY}|" .env
            echo "✅ SUPABASE_SERVICE_ROLE_KEY updated from GitHub Secrets"
          fi
          if [ -n "$SUPABASE_PUBLISHABLE_KEY" ]; then
            sed -i "s|^SUPABASE_ANON_KEY=.*|SUPABASE_ANON_KEY=${SUPABASE_PUBLISHABLE_KEY}|" .env
            echo "✅ SUPABASE_ANON_KEY updated from GitHub Secrets"
          fi
          # Inject JWT_SECRET from GitHub Secret if provided (parity with the
          # PREPROD path in ci.yml, PR #630). Optional: when the secret is
          # unset the .env value (guaranteed present by REQUIRED_VARS) is kept.
          if [ -n "$JWT_SECRET_OVERRIDE" ]; then
            if grep -q '^JWT_SECRET=' .env; then
              sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${JWT_SECRET_OVERRIDE}|" .env
            else
              echo "JWT_SECRET=${JWT_SECRET_OVERRIDE}" >> .env
            fi
            echo "✅ JWT_SECRET updated from GitHub Secrets"
          fi
          # Inject the seo-control-plane synthetic-crawler probe HMAC secret and
          # ATOMICALLY enable its rate-limit exemption (BotGuardMiddleware is the
          # verifier — PR #1141). The enable flag is flipped to true ONLY when the
          # secret is actually provided, so a half-config ("enabled but no secret")
          # never reaches PROD; the app would fail-closed + log loudly anyway, but
          # we avoid the state entirely. When PROD_SEO_CP_SYNTHETIC_PROBE_SECRET is
          # unset the exemption stays OFF: probes get throttled and the in-app
          # 429-rate alert fires (no silent degradation). Mirrors the JWT pattern.
          # `|` sed delimiter is safe — the value is hex (openssl rand -hex 32).
          if [ -n "$SEO_CP_SYNTHETIC_PROBE_SECRET_OVERRIDE" ]; then
            if grep -q '^SEO_CP_SYNTHETIC_PROBE_SECRET=' .env; then
              sed -i "s|^SEO_CP_SYNTHETIC_PROBE_SECRET=.*|SEO_CP_SYNTHETIC_PROBE_SECRET=${SEO_CP_SYNTHETIC_PROBE_SECRET_OVERRIDE}|" .env
            else
              echo "SEO_CP_SYNTHETIC_PROBE_SECRET=${SEO_CP_SYNTHETIC_PROBE_SECRET_OVERRIDE}" >> .env
            fi
            if grep -q '^SEO_CP_SYNTHETIC_PROBE_ENABLED=' .env; then
              sed -i "s|^SEO_CP_SYNTHETIC_PROBE_ENABLED=.*|SEO_CP_SYNTHETIC_PROBE_ENABLED=true|" .env
            else
              echo "SEO_CP_SYNTHETIC_PROBE_ENABLED=true" >> .env
            fi
            echo "✅ SEO_CP synthetic-probe exemption secret injected + enabled from GitHub Secrets"
          else
            echo "ℹ️ PROD_SEO_CP_SYNTHETIC_PROBE_SECRET unset — synthetic-crawler exemption stays OFF (probes throttled; in-app 429 alert will fire)"
          fi
          # Inject the synthetic-probe egress allowlist (defense-in-depth FLOOR,
          # synthetic-probe egress floor, 2026-06-26). Independent of the HMAC secret above: this floor recognizes
          # the probe by its anti-spoofed cf-connecting-ip, so the exemption keeps
          # working even when Cloudflare strips the x-synthetic-probe header (root
          # cause of the 2026-06-25 self-throttle). Unset = floor OFF (fail-closed;
          # HMAC path only). `|` sed delimiter is safe — IP/CIDR values use :, /, ,.
          if [ -n "$SEO_CP_SYNTHETIC_PROBE_EGRESS_IPS_OVERRIDE" ]; then
            if grep -q '^SEO_CP_SYNTHETIC_PROBE_EGRESS_IPS=' .env; then
              sed -i "s|^SEO_CP_SYNTHETIC_PROBE_EGRESS_IPS=.*|SEO_CP_SYNTHETIC_PROBE_EGRESS_IPS=${SEO_CP_SYNTHETIC_PROBE_EGRESS_IPS_OVERRIDE}|" .env
            else
              echo "SEO_CP_SYNTHETIC_PROBE_EGRESS_IPS=${SEO_CP_SYNTHETIC_PROBE_EGRESS_IPS_OVERRIDE}" >> .env
            fi
            echo "✅ SEO_CP synthetic-probe egress floor configured from GitHub Variables"
          else
            echo "ℹ️ PROD_SEO_CP_SYNTHETIC_PROBE_EGRESS_IPS unset — egress floor OFF (HMAC path only)"
          fi

          docker network create automecanik-prod 2>/dev/null || true

          # Rollback point already captured by the "💾 Capture rollback point"
          # step as $ROLLBACK_IMAGE_ID — the running container's IMMUTABLE image
          # ID, read BEFORE the safety gate retagged :production.
          # Do NOT re-derive production-previous from :production here: by this
          # point :production already points at the NEW image, which is exactly
          # what made the old rollback restore the broken build.
          echo "🔒 Rollback point pinned: ${ROLLBACK_IMAGE_ID:-<none — auto-rollback disabled>}"

          # POINT OF NO RETURN. Past this line the running container is destroyed,
          # so ANY later failure — including in "Validate PROD" — must roll back.
          # The dedicated `if: failure()` rollback step keys off this flag, which
          # is why it is set BEFORE the stop/rm rather than after a successful up.
          echo "DEPLOY_STARTED=1" >> "$GITHUB_ENV"

          docker stop nestjs-remix-caddy nestjs-remix-monorepo-prod 2>/dev/null || true
          docker rm nestjs-remix-caddy nestjs-remix-monorepo-prod 2>/dev/null || true

          # 🚨 Sentry secrets injection via SOPS exec-env wrapper (parity with
          # ci.yml preprod deploy step). docker-compose.prod.yml declares
          # `environment: - SENTRY_DSN` etc. which inherit from this shell's env.
          # If sops/age unavailable on this runner, fall back to plain
          # `docker compose up` — Sentry SDK no-ops, deploy still succeeds.
          # Source ~/production/.env first so bare `environment: - VAR` refs
          # for SUPABASE_*, INTERNAL_API_KEY, etc. inherit from the shell
          # (not just env_file, which is overridden by `environment: -` listings).
          set -a
          # shellcheck disable=SC1091
          . "$PROD_DIR/.env"
          set +a

          SOPS_FILE="$GITHUB_WORKSPACE/secrets/sentry.prod.sops.env"
          AGE_KEY_FILE="${SOPS_AGE_KEY_FILE:-$HOME/.config/sops/age/keys.txt}"
          if command -v sops >/dev/null 2>&1 \
             && [ -f "$SOPS_FILE" ] \
             && [ -r "$AGE_KEY_FILE" ]; then
            echo "✅ Injecting Sentry secrets via sops exec-env"
            export SOPS_AGE_KEY_FILE="$AGE_KEY_FILE"
            sops exec-env "$SOPS_FILE" \
              'docker compose -f docker-compose.prod.yml -f docker-compose.caddy.yml up -d --no-deps monorepo_prod caddy redis_prod'
          else
            echo "::warning::sops binary, secrets file, or age key missing on runner — Sentry SDK will start in no-op mode for PROD"
            echo "  sops:        $(command -v sops || echo 'NOT FOUND')"
            echo "  SOPS_FILE:   $SOPS_FILE ($([ -f "$SOPS_FILE" ] && echo present || echo absent))"
            echo "  age key:     $AGE_KEY_FILE ($([ -r "$AGE_KEY_FILE" ] && echo readable || echo unreadable))"
            docker compose -f docker-compose.prod.yml -f docker-compose.caddy.yml up -d --no-deps monorepo_prod caddy redis_prod
          fi
          docker compose -f docker-compose.imgproxy.yml up -d --force-recreate

          echo "Waiting for containers to start (60s)..."
          sleep 60

          if ! docker ps | grep -q nestjs-remix-monorepo-prod; then
            echo "Container not running - checking logs..."
            docker logs nestjs-remix-monorepo-prod --tail 50
            exit 1
          fi

          # Image assertion: verify container runs the correct image
          EXPECTED_IMAGE="massdoc/nestjs-remix-monorepo:production"
          ACTUAL_IMAGE=$(docker inspect nestjs-remix-monorepo-prod --format='{{.Config.Image}}')
          if [ "$ACTUAL_IMAGE" != "$EXPECTED_IMAGE" ]; then
            echo "FATAL: Container running $ACTUAL_IMAGE instead of $EXPECTED_IMAGE"
            exit 1
          fi
          echo "Image verified: $ACTUAL_IMAGE"

          # Health check with retry
          echo "Running health check (inside container)..."
          RETRIES=5
          HEALTH=""
          for i in $(seq 1 $RETRIES); do
            HEALTH=$(docker exec nestjs-remix-monorepo-prod wget -qO- http://localhost:3000/health 2>/dev/null || echo "")
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "/health -> OK (attempt $i/$RETRIES)"
              break
            fi
            echo "Health check attempt $i/$RETRIES failed, waiting 10s..."
            sleep 10
          done

          HEALTH_OK=0
          if echo "$HEALTH" | grep -q '"status":"ok"'; then HEALTH_OK=1; fi

          # SSR gate (BLOCKING). Only meaningful once the process answers /health.
          # See scripts/ci/prod-ssr-probe.sh for why /health alone is not enough
          # and why `noindex` is the signal that catches the degraded fallback.
          SSR_OK=0
          if [ "$HEALTH_OK" = "1" ]; then
            echo "🖥️ Running SSR gate (GET /)..."
            for i in $(seq 1 3); do
              if bash "$GITHUB_WORKSPACE/scripts/ci/prod-ssr-probe.sh" "post-deploy $i/3"; then
                SSR_OK=1
                break
              fi
              echo "  SSR gate attempt $i/3 failed, waiting 10s..."
              sleep 10
            done
          fi

          if [ "$HEALTH_OK" != "1" ] || [ "$SSR_OK" != "1" ]; then
            if [ "$HEALTH_OK" != "1" ]; then
              echo "❌ Health check failed after $RETRIES attempts"
            else
              echo "❌ SSR gate failed — GET / is not a healthy, indexable, server-rendered document"
            fi
            docker logs nestjs-remix-monorepo-prod --tail 30
            # Rollback is NOT done here: the dedicated `if: failure()` step owns it,
            # so that a failure in "Validate PROD" rolls back through the SAME path.
            exit 1
          fi

          echo "✅ PROD deployment successful — /health OK and GET / is a healthy indexable SSR document"

          docker image prune -f

      - name: ✅ Validate PROD
        run: |
          sleep 30
          FAILED=0

          # All checks run INSIDE the container (host networking unreliable on self-hosted runner)
          EXEC="docker exec nestjs-remix-monorepo-prod"

          # Image assertion (double-check)
          EXPECTED_IMAGE="massdoc/nestjs-remix-monorepo:production"
          ACTUAL_IMAGE=$(docker inspect nestjs-remix-monorepo-prod --format='{{.Config.Image}}')
          if [ "$ACTUAL_IMAGE" != "$EXPECTED_IMAGE" ]; then
            echo "FATAL: Container image mismatch: $ACTUAL_IMAGE (expected $EXPECTED_IMAGE)"
            FAILED=1
          else
            echo "Image OK: $ACTUAL_IMAGE"
          fi

          # Test health
          echo "Testing health inside container..."
          HEALTH=$($EXEC wget -qO- http://localhost:3000/health 2>/dev/null || echo "FAIL")
          if echo "$HEALTH" | grep -q '"status":"ok"'; then
            echo "✅ /health -> OK"
          else
            echo "❌ /health -> FAILED: $HEALTH"
            docker logs nestjs-remix-monorepo-prod --tail 20
            FAILED=1
          fi

          # SSR gate (BLOCKING) — /health and the API probes never render SSR, so
          # this is the only gate here that sees an SSR regression. A failure of
          # THIS step now rolls back, via the dedicated `if: failure()` step.
          echo "🖥️ Testing SSR document (GET /)..."
          if ! bash "$GITHUB_WORKSPACE/scripts/ci/prod-ssr-probe.sh" "validate"; then
            FAILED=1
          fi

          # Test API endpoint
          echo "🔌 Testing API endpoint..."
          API=$($EXEC wget -qO- http://localhost:3000/api/catalog/families 2>/dev/null || echo "FAIL")
          if echo "$API" | grep -q '"families"'; then
            echo "✅ /api/catalog/families -> OK"
          else
            echo "⚠️ /api/catalog/families -> unexpected response (non-blocking)"
          fi

          # Test Supabase connectivity (catches disabled/invalid keys)
          echo "🔌 Testing Supabase RPC connectivity..."
          SUPABASE_TEST=$($EXEC wget -qO- 'http://localhost:3000/api/gamme-rest/4/page-data-rpc-v2' 2>/dev/null || echo "FAIL")
          if echo "$SUPABASE_TEST" | grep -q '"motorisations"'; then
            echo "✅ Supabase RPC -> OK"
          else
            echo "❌ Supabase RPC -> FAILED (check SUPABASE_SERVICE_ROLE_KEY)"
            echo "$SUPABASE_TEST" | head -c 200
            FAILED=1
          fi

          # Admin guard verification (warning only, non-blocking)
          echo "🛡️ Testing admin guards..."
          ADMIN_RESP=$($EXEC wget -q --server-response -O /dev/null http://localhost:3000/api/admin/content-refresh/dashboard 2>&1 | grep "HTTP/" | awk '{print $2}')
          if [ "$ADMIN_RESP" = "403" ] || [ "$ADMIN_RESP" = "401" ]; then
            echo "✅ admin guard /content-refresh -> $ADMIN_RESP"
          else
            echo "⚠️ admin guard /content-refresh -> ${ADMIN_RESP:-unknown} (expected 401/403)"
          fi

          ADMIN_RESP=$($EXEC wget -q --server-response -O /dev/null http://localhost:3000/api/admin/page-briefs 2>&1 | grep "HTTP/" | awk '{print $2}')
          if [ "$ADMIN_RESP" = "403" ] || [ "$ADMIN_RESP" = "401" ]; then
            echo "✅ admin guard /page-briefs -> $ADMIN_RESP"
          else
            echo "⚠️ admin guard /page-briefs -> ${ADMIN_RESP:-unknown} (expected 401/403)"
          fi

          if [ "$FAILED" = "1" ]; then
            echo "❌ Validation failed!"
            exit 1
          fi

          echo "🎉 Version ${{ github.ref_name }} deployed to production!"

      - name: ⏪ Rollback PROD (any failure past the point of no return)
        # Owns the rollback for the WHOLE job, so that a failure in "Validate
        # PROD" rolls back through the SAME verified path as a failed health/SSR
        # gate — previously only the deploy step could roll back, and a Validate
        # failure left the broken build live.
        #
        # Guards:
        #   DEPLOY_STARTED=1 — only set once the running container is destroyed.
        #     A failure BEFORE that (checkout, capture, safety gate) left PROD
        #     untouched, so rolling back would be wrong.
        #   ROLLBACK_IMAGE_ID — empty only in break-glass mode (no rollback
        #     point existed); the script fails loudly rather than pretend.
        if: ${{ failure() && env.DEPLOY_STARTED == '1' }}
        env:
          ROLLBACK_IMAGE_ID: ${{ env.ROLLBACK_IMAGE_ID }}
        run: |
          cd ~/production
          bash "$GITHUB_WORKSPACE/scripts/ci/prod-rollback.sh"

      - name: 🔔 Notify Slack on success
        if: ${{ success() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"✅ PROD deployed: ${{ github.ref_name }}\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"✅ *Production Deployed*\n*Version:* \`${{ github.ref_name }}\`\n*Author:* ${{ github.actor }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"
                  }
                }
              ]
            }"

      - name: 🔔 Notify Slack on failure
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"❌ PROD deploy FAILED: ${{ github.ref_name }}\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"❌ *Production Deploy FAILED*\n*Version:* \`${{ github.ref_name }}\`\n*Author:* ${{ github.actor }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"
                  }
                }
              ]
            }"
