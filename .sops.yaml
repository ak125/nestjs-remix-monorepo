# SOPS configuration for AutoMecanik monorepo
# Reference: https://github.com/getsops/sops
#
# Each file matched by `path_regex` is encrypted with all listed `age` recipients.
# Anyone holding ANY of those private keys can decrypt the file.
#
# How to add a new recipient (new VPS, new operator):
#   1. On the new machine: `age-keygen -o ~/.config/sops/age/keys.txt`
#      → outputs both private key (keep) and public key `age1...` (share)
#   2. Add the public key to the relevant `age:` list below
#   3. Re-encrypt existing files: `sops updatekeys secrets/<file>.sops.env`
#   4. Commit `.sops.yaml` + the updated `secrets/*.sops.env`
#
# How to remove a compromised recipient:
#   1. Remove its public key from the lists below
#   2. `sops updatekeys secrets/<file>.sops.env` for every affected file
#   3. ROTATE every secret value in those files (the old encrypted blob is in
#      git history and the removed key still decrypts it — only rotation
#      invalidates the leak)
#
# Public keys are PUBLIC by design — safe to commit. Private keys MUST stay on
# their owning machine + be backed up to Bitwarden / 1Password / Yubikey.

keys:
  # --- VPS DEV (46.224.118.55, hostname dev-automecanik) ---
  # Generated 2026-05-06, private key in ~deploy/.config/sops/age/keys.txt on dev VPS.
  # NOTE: this VPS does NOT host the preprod runtime — preprod runs on the
  # GitHub Actions self-hosted runner (`runner_vps`, see below). dev_vps is
  # kept as a recipient so the operator can `sops decrypt` from this machine
  # when triaging issues without needing to SSH to the runner.
  - &dev_vps age17p8cdc42j9fj0045pqd33epc4z3fkgr7643365uj73hl2zq74gzqfkx6jd

  # --- VPS PROD / GitHub Actions self-hosted runner (49.12.233.2, ubuntu-16gb-nbg1-1) ---
  # Generated 2026-05-06. This is the machine where:
  #   - the GitHub Actions self-hosted runner `hetzner-prod` lives
  #   - the preprod container actually runs (port 3200, deployed by ci.yml job)
  #   - the production container runs (when promoted via tag push)
  # Private key at /home/deploy/.config/sops/age/keys.txt (chmod 600, owned by deploy user).
  # CI workflow reads it via SOPS_AGE_KEY_FILE env var.
  - &runner_vps age14v0s0qhn68ctmf5m649lra4fzkv56sz7wuzuaq7adavxvrggpe0qa2v8n2

  # --- Operator backup (Fafa) — TO ADD ASAP from personal laptop ---
  # Currently UNSET → secrets in this repo are recoverable ONLY from the two
  # VPS-resident keys above. If both VPS are wiped before this is filled,
  # secrets must be regenerated.
  # Steps:
  #   1. On personal machine: `age-keygen -o ~/.config/sops/age/owner.key`
  #   2. Backup ~/.config/sops/age/owner.key to Bitwarden / 1Password
  #   3. Replace this comment with: `- &owner_fafa <public-key>`
  #   4. Add `*owner_fafa` to creation_rules below
  #   5. `sops updatekeys -y secrets/sentry.dev.sops.env`
  #   6. Commit + push.

creation_rules:
  # Sentry-only secrets (PR-A scope) — DEV environment
  - path_regex: ^secrets/sentry\.dev\.sops\.env$
    key_groups:
      - age:
          - *dev_vps
          - *runner_vps

  # PROD secrets — same machine as runner_vps (PROD container co-locates
  # with the GitHub Actions self-hosted runner on 49.12.233.2). dev_vps is
  # kept as recipient for triage parity with DEV (operator can sops-decrypt
  # locally to verify what's deployed without SSH'ing to the runner).
  - path_regex: ^secrets/sentry\.prod\.sops\.env$
    key_groups:
      - age:
          - *dev_vps
          - *runner_vps

  # Future: other DEV / PROD secrets migrated from plain .env
  - path_regex: ^secrets/.+\.(dev|prod)\.sops\.env$
    key_groups:
      - age:
          - *dev_vps
          - *runner_vps
