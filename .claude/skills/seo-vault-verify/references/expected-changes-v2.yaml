# SEO Vault Verify — Manifeste canonique v2
#
# v1 → v2 (2026-04-24) : calibration après audit one-shot.
# Les 6 false positives de v1 sont corrigés avec evidence vault réel.
# Les 18 SHA256 PENDING_BASELINE sont inchangés (gel à faire en une passe ultérieure).
#
# Règles de matching : Unicode NFC, case-insensitive par défaut, whitespace collapse.
---
version: 2
previous_version: 1
source_zip_sha256: PENDING_BASELINE
adr_reference: ADR-002

files_regenerated:
  - path: 00-Meta/README.md
    must_contain:
      - pattern: "ADR-002"
      - pattern: "Kickoff-Week1"
      # v2 fix F1 : vault utilise `maillage-interne` (dash) pas `pilier/maillage` (slash).
      # "pilier primaire" est présent mais séparé du nom de tag.
      - pattern: "maillage-interne"
      - pattern: "pilier primaire"
      - pattern: "primaire"
        near: "maillage"
        window: 400
      - pattern: "secondaire"
        near: "autorité"
        window: 400
      - pattern: "playbook"
    cross_ref_targets:
      - ADR-002-maillage-interne-first
      - Kickoff-Week1

  - path: 00-Meta/Conventions.md
    tags_required:
      - "#pilier/maillage"
      - "#pilier/autorite"
    must_contain:
      - pattern: "même discipline de maillage"
      - pattern: "ADR-002"
    tag_context:
      - tag: "#pilier/maillage"
        qualifier_pattern: "primaire"
      - tag: "#pilier/autorite"
        qualifier_pattern: "secondaire"

  - path: 00-Meta/Glossary.md
    sections_required:
      # v2 fix F2 : vault utilise em-dash — pas colon : entre terme bold et définition
      - title: "Maillage interne"
        min_terms: 11
        term_markers: ["**", "—"]
      - title: "Crawl & indexation"
        min_terms: 6
        term_markers: ["**", "—"]
    must_contain:
      - pattern: "PageRank interne"
      - pattern: "orpheline"
      - pattern: "feeding"
      - pattern: "sculpture"
      - pattern: "boilerplate dilutif"
      - pattern: "profondeur depuis home"

  - path: 00-Meta/Dataview-queries.md
    sections_required:
      - title: "Maillage interne"
      # v2 fix F3 : vault utilise "Autorité externe (opportuniste — ADR-002)"
      - title: "Autorité externe"
      - title: "Activité récente"
    must_contain:
      # v2 fix F3 : vault dit "Gammes marquées comme orphelines" et "Entités orphelines"
      - pattern: "orphelines"
      - pattern: "money pages sous-alimentées"
      - pattern: "feeding"
      - pattern: "draft"
        near: "14"
        window: 200
    dataview_blocks_min: 3

  - path: 02-ADR/ADR-001-entity-architecture.md
    must_contain:
      - pattern: "corollaire maillage"
      - pattern: "ADR-002"
      - pattern: "niveau 4"
        near: "orpheline"
        window: 400
      - pattern: "dépendance"
        near: "ADR-002"
        window: 400
    tags_required:
      - "#pilier/maillage"

  - path: 03-Entities/Gammes/_template-gamme.md
    frontmatter_keys_required:
      - inbound-count
      - outbound-count
      - pr-interne
      - depth-from-home
      - orpheline
    sections_required:
      - title: "Maillage interne"
    must_contain:
      # v2 fix F4 : vault dit "Hubs qui alimentent" et "Money pages que cette gamme alimente"
      - pattern: "Hubs"
        near: "alimentent"
        window: 100
      - pattern: "Money pages"
        near: "alimente"
        window: 300

  - path: 05-Content/_template-gamme-brief.md
    sections_required:
      - title: "Maillage interne associé"
    must_contain:
      - pattern: "10 liens internes entrants"
      - pattern: "J+30"
      - pattern: "plan de feeding"
      - pattern: "blocs sortants"
      - pattern: "anti-sur-optimisation"
        near: "anchor"
        window: 500

  - path: 07-Authority/_template-linkable-asset.md
    must_contain:
      - pattern: "opportuniste"
      - pattern: "Intégration au maillage interne"
      # v2 fix F5 : frontmatter utilise "priority: p3" (EN), pas "priorité: p3" (FR)
      - pattern: "p3"
        near: "priority"
        window: 300
      - pattern: "minimal"
        near: "outreach"
        window: 400
      - pattern: "modéré"
        near: "outreach"
        window: 400
      - pattern: "soutenu"
        near: "outreach"
        window: 400

  - path: 08-Monitoring/_template-gsc-report.md
    sections_required:
      - title: "Performance par pilier"
      - title: "Pilier 5"
    must_contain:
      - pattern: "orphelines"
      - pattern: "money pages sous-alimentées"
      # v2 fix F6 : vault dit "PageRank interne médian"
      - pattern: "PageRank interne médian"
      - pattern: "profondeur"
      - pattern: "% liens"
        near: "4"
        window: 200
      - pattern: "feeding"
        near: "positions"
        window: 600

