# Business handoffs (department→department), distinct from the pipeline `handoffs`
# above. Communication by contract, not free discussion. `contract_ref` points to
# the runtime effort that owns the verdict; `contract_status: planned` = no JSON
# schema until a real consumer validates it (no speculative canon).
department_handoffs:
  - id: supplier-to-sales-availability
    from: supplier
    to: sales
    contract_ref: availability-verdict.v1
    contract_status: planned
    purpose: "Vérifier la disponibilité avant paiement (commerce-loop-v1)"
    gate: human_review_or_owner_go
    state: PARTIAL
    evidence:
      runtime: "feat/supplier-truth-runtime-wiring"

  - id: pricing-to-sales-margin
    from: pricing
    to: sales
    contract_ref: margin-verdict.v1
    contract_status: planned
    purpose: "Protéger la marge avant validation commande (never sell at loss)"
    gate: "VENTE_BELOW_ACHAT (enforced at import)"
    state: PARTIAL
    evidence:
      scripts:
        - backend/src/modules/pricing/services/pricing-invariants.service.ts

  # data is foundational: runtime health → data measurement truth → sales decisions.
  - id: runtime-to-data-health
    from: runtime
    to: data
    contract_ref: runtime-health-verdict.v1
    contract_status: planned
    purpose: "Signaler une dégradation runtime qui fausse la collecte de mesure"
    gate: observe_only
    state: PARTIAL
    evidence:
      scripts:
        - backend/src/modules/health/health.module.ts

  - id: data-to-sales-tracking-integrity
    from: data
    to: sales
    contract_ref: tracking-integrity-verdict.v1
    contract_status: planned
    purpose: "Certifier la fiabilité des métriques funnel avant décision commerciale (data conditionne les autres leads)"
    gate: human_review_or_owner_go
    state: PARTIAL
    evidence:
      scripts:
        - backend/src/modules/seo-monitoring/services/funnel-events.service.ts

  # wiki produces validated knowledge; seo (next seed) is its consumer (ADR-031/033).
  - id: wiki-to-seo-readiness
    from: wiki
    to: seo
    contract_ref: wiki-readiness-verdict.v1
    contract_status: planned
    purpose: "Autoriser la consommation SEO seulement quand la fiche WIKI est READY (ADR-033)"
    gate: human_review_required
    state: PARTIAL
    evidence:
      adr: ADR-033

  # wiki → seo → sales: pages drive add-to-cart, which drives kept payments.
  - id: seo-to-sales-atc-readiness
    from: seo
    to: sales
    contract_ref: page-atc-readiness.v1
    contract_status: planned
    purpose: "Certifier qu'une page R2 est transactionnelle (vehicle-aware, ATC présent) avant de compter sur la conversion"
    gate: "catalog_signature (ADR-066 structural gate)"
    state: PARTIAL
    evidence:
      scripts:
        - backend/src/modules/seo/r2/constants/r2-eligibility.constants.ts

  # availability truth flows supplier → catalog (displayed) so out-of-stock pieces
  # aren't shown vendable (epicentre rupture). Quarantine deferred until the
  # supplier-truth sentinel is live — never a blind hide.
  - id: supplier-to-catalog-availability
    from: supplier
    to: catalog
    contract_ref: catalog-availability-reconciliation.v1
    contract_status: planned
    purpose: "Réconcilier dispo affichée (catalogue) vs dispo réelle (fournisseur) — pas de pièce affichée vendable mais en rupture"
    gate: "supplier-truth sentinel live (sentinelle avant quarantaine, jamais hide aveugle)"
    state: PARTIAL
    evidence:
      scripts:
        - backend/src/modules/catalog/services/catalog-data-integrity.service.ts
