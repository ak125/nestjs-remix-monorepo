# ── Business departments (slug-keyed) ─────────────────────────────────────────
# Reference projection of the business-org layer (Achats, Commercial, Pricing…),
# DISTINCT from `surfaces` (which are Claude-session cwds). Slugs, not numbers —
# no collision with technical domains D1-D16; `repo_domains` bridges the two.
# Machine SoT for structured fields here; narrative SoT stays
# audit/automecanik-departments-map.md (Vue 5 report / Vue 6). `state` exposes
# unused value. V1 seeds the commerce-loop core only; capabilities reference real
# modules via `declared_capabilities` (never recopied). Warn-only — hard-fail
# enforcement requires a vault ADR (same stance as the rest of this file).
departments:
  - id: supplier
    label: "Achats & Fournisseurs"
    lead: supplier-lead
    priority: P0                     # P0-P3 (V1 hand-set = max criticality of repo_domains; V1.5 derives it)
    kpi_primary: supplier_unavailability_cancellations
    repo_domains: [D11, D13, D15]
    capabilities: [suppliers-service, supplier-truth]
    state: partial                   # supplier-truth runtime wiring not yet merged

  - id: sales
    label: "Commercial & Ventes"
    lead: sales-lead
    priority: P0
    kpi_primary: payments_kept
    repo_domains: [D11]
    capabilities: [cart, orders, funnel-events]
    state: partial                   # funnel instrumentation partial (not all events emitted)

  - id: pricing
    label: "Pricing"
    lead: pricing-lead
    priority: P0
    kpi_primary: margin_protected
    repo_domains: [D11]
    capabilities: [pricing-invariants]
    state: partial                   # economic-governance system; invariants live, CP partial

  - id: data
    label: "Data & Analytics"
    lead: data-lead
    priority: P1                     # max criticality of repo_domains (D10 = P1)
    kpi_primary: metric_reliability
    repo_domains: [D10]
    capabilities: [analytics, cwv-beacon]
    state: partial                   # measurement exists; reliability gaps (funnel/CWV instrumentation)

  - id: runtime
    label: "Runtime & Observability"
    lead: runtime-lead
    priority: P1
    kpi_primary: runtime_health
    repo_domains: [D10, D13]
    capabilities: [observability, health, rpc-alerts]
    state: partial                   # observability live; commerce-runtime plane (RCOP) partial

  - id: wiki
    label: "Knowledge RAW & WIKI"
    lead: wiki-lead
    priority: P1                     # max criticality of repo_domains (D6 = P1)
    kpi_primary: wiki_readiness
    repo_domains: [D6]
    capabilities: [wiki-proposal-writer, rag-knowledge-bootstrap]
    state: partial                   # ADR-033 Phase 2 sas; readiness chain partial (wiki produces, consumers read)

  - id: seo
    label: "Production Pages & SEO"
    lead: seo-lead
    priority: P1                     # max criticality of repo_domains (D3 = P1)
    kpi_primary: pages_generating_atc
    repo_domains: [D3]
    capabilities: [seo-pages, seo-roles, seo-gamme-audit]
    state: partial                   # pages live; ATC conversion gap (IMPROVE) — resolves wiki→seo handoff

  - id: catalog
    label: "Catalogue & Compatibilité"
    lead: catalog-lead
    priority: P0                     # max criticality of repo_domains (D1/D4 = P0)
    kpi_primary: compat_and_displayed_availability
    repo_domains: [D1, D4]
    capabilities: [catalog-core, compatibility, catalog-integrity, vehicle-ops]   # vehicle-ops resolves via skills.registry
    state: partial                   # catalog live; displayed-vs-real availability gap (epicentre rupture, IMPROVE)

