#                                           not in this canon. An entrypoint's status
#                                           is not a function of how confidently we
#                                           parsed it.
#
#  If you're tempted to add a section that isn't a runtime entrypoint invariant,
#  open a NEW contract file instead.
#
#  FUTURE-SPLIT WARNING:
#  If a section starts describing INSTANCE-LEVEL config (a specific queue's
#  concurrency, a cron's exact cadence, a cache's specific TTL) instead of
#  INVARIANTS (kind of entrypoint, owner, status, layer), STOP and create a
#  dedicated contract file.
# ──────────────────────────────────────────────────────────────────────────────────
#
# V1 COVERAGE: this contract protects ONE invariant —
#   the **canonical classification of executable runtime entrypoints** with
#   stable ownership, domain attribution, lifecycle status, and layer assignment.
#
# It does NOT cover queue config, cron schedules, cache topology, RPC signatures,
# or HTTP auth gates — those are dedicated contracts (canon roadmap §63-71).
#
# DERIVED-NOT-DECLARED:
#   `layer` IS declared in YAML for human readability + grep-friendliness, but
#   it is MECHANICALLY VALIDATED at build time against:
#     1. `architecture.yaml#layers[].id` (FK existence check) — test §4.5a
#     2. `inferLayerFromPath(path, architectureLayers)` — test §4.5b
#   Any drift (e.g. `path: frontend/... layer: backend`) FAILS the build.
#   The single source of truth is `path`. Future fields derivable from `path`
#   must follow the same pattern or be omitted entirely.
#
# L1 ALIGNMENT:
#   `id` format = `runtime:<path>` (matches Layer 1 audit/registry/runtime.json
#   produced by scripts/registry/build-runtime-registry.js). Cross-contract
#   test §4.2 verifies that every L2 id appears in L1 (subset, not equivalence).
#
# WORKFLOW
#   Edit this YAML → run `npm run runtime-contract:build` → commit ONLY the YAML.
#   The JSON schema mirror at `.spec/00-canon/_schema/runtime-topology.schema.json`
