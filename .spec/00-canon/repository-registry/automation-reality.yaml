# .spec/00-canon/repository-registry/automation-reality.yaml
#
# Layer 2 overlay — Automation Reality Registry V1 (ADR-058 pattern).
#
# WHAT this registry IS :
#   - Formal distinction between automation DESIGN (cabled : workflow, script,
#     migration exists in repo) and automation REALITY (running : trigger fired,
#     output produced, consumer observes).
#   - First registry in the monorepo to model `intended_mode vs actual_mode`.
#   - SoT for "what is REALLY automated here, vs claimed-but-not-running".
#
# WHAT this registry IS NOT :
#   - NOT a CMDB inventory (we admit only automations where intent↔execution
#     gap affects a real operation — see governance gravity defense in plan).
#   - NOT a system to add new automation (it OBSERVES existing reality).
#   - NOT for purely informative systems (audit/postmortem/doc) — those have
#     no gap to track.
#
# HOW TO ADD AN ENTRY (post-merge V1, NOT during seed) :
#   1. Fill all fields per AutomationEntrySchema (packages/registry/src/overlay/automation-reality.ts)
#   2. evidence[] MUST have ≥1 design reference (path:line+excerpt or path-only)
#   3. If actual_mode=ACTIVE → runtime_evidence MUST prove trigger+output+consumer ≤30j
#   4. If intended_mode ≠ actual_mode → missing_step MUST describe convergence path
#   5. last_verified_by = your @github-handle (NOT a bot) ; last_verified_method ≠ seed-from-plan-review
#   6. Run `tsx scripts/registry/validate-automation-overlay.ts` then commit
#
# Soft cap V1 : ≤30 entries before re-evaluation. PR adding >5 entries at once
# refused without justification. See plan §"Defense against governance gravity".

schemaVersion: "1.0.0"

