# Évidence PR-C v2 — MOTEUR BMW N47 (diesel 2.0, 4 cyl).
# Axe transverse : récolté UNE fois, diffusé sur tous les véhicules N47.
# Faits reformulés FR non-verbatim ; provenance par source ; corroboration calculée
# par l'injecteur ; related_gammes/related_diagnostic validés contre les entités RAW.
engine_family: n47
fuel: diesel
displacement_liter: 2.0
manufacturer: bmw
market: EU

# Fitment harvesté (familles BMW équipées du N47). L'injecteur ne touche que les
# fiches RAW existantes ET portant une motorisation diesel (sanity anti mis-attribution).
applies_to_vehicles:
  - bmw-serie-1-e87
  - bmw-serie-3-e90
  - bmw-serie-3-touring-e91
  - bmw-serie-3-coupe-e92
  - bmw-serie-3-decapotable-e93
  - bmw-serie-5-e60
  - bmw-x1-e84
  - bmw-x3-e83

faults:
  - issue: usure_chaine_distribution
    label: "Usure prématurée de la chaîne de distribution (montée à l'arrière du moteur)"
    symptoms:
      - "Bruit de cliquetis ou de chaîne métallique à l'arrière du compartiment moteur, surtout au démarrage à froid"
      - "Démarrage difficile après un court arrêt"
      - "Ralenti irrégulier"
      - "Possibilité de rupture sans signe avant-coureur sur les chaînes de première génération"
    typical_onset_km: 80000
    severity: high
    diagnostic_safe: true
    related_gammes: [kit-de-chaine-de-distribution, chaine-de-distribution]
    related_diagnostic: [distribution-courroie]
    sources:
      - {url: "https://www.autodoc.co.uk/info/bmw-e90-n47-timing-chain-failures", source_type: base_technique, source_market: UK, lang_original: en, confidence: high}
      - {url: "https://www.bimmer-mag.com/issues-with-n47-and-b47-engines/", source_type: presse, source_market: US, lang_original: en, confidence: medium}
      - {url: "https://www.pistonheads.com/gassing/topic.asp?t=1388114", source_type: forum, source_market: UK, lang_original: en, confidence: low}

  - issue: egr_refroidisseur_fuite_glycol
    label: "Fuite de glycol du refroidisseur EGR — risque de surchauffe et d'incendie (rappel officiel)"
    symptoms:
      - "Encrassement de la vanne EGR par dépôts de carbone : moteur bruyant, mou ou fumant"
      - "Fuite de liquide de refroidissement dans le refroidisseur EGR pouvant faire fondre le collecteur d'admission"
      - "Risque d'incendie en combinaison avec suies et hautes températures"
    severity: high
    diagnostic_safe: true
    related_gammes: [vanne-egr]
    related_diagnostic: [injection, refroidissement]
    sources:
      - {url: "https://static.nhtsa.gov/odi/rcl/2018/RCRIT-18V755-1757.pdf", source_type: recall, source_market: US, lang_original: en, confidence: high}
      - {url: "https://www.autonews.com/article/20181023/COPY01/310239966/bmw-expands-recall-on-fire-risk-to-1-6-million-diesel-vehicles/", source_type: presse, source_market: US, lang_original: en, confidence: medium}

  - issue: volets_admission_swirl_casse
    label: "Casse des volets d'admission (swirl flaps) du collecteur, ingérés par le moteur"
    symptoms:
      - "Légère perte de puissance et faible cliquetis venant du collecteur d'admission"
      - "Ralenti irrégulier et vibrations moteur"
      - "Ratés d'allumage avec codes défaut et voyant moteur allumé"
      - "Risque d'ingestion d'un volet plastique cassé entraînant la destruction du moteur"
    typical_onset_km: 150000
    severity: high
    diagnostic_safe: true
    related_gammes: [collecteur-d-admission]   # absent du RAW → l'injecteur retire ce lien + note (démo validation)
    related_diagnostic: [injection]
    sources:
      - {url: "https://apexxengines.co.uk/bmw-n47-swirl-flap-problems-signs/", source_type: base_technique, source_market: UK, lang_original: en, confidence: medium}
      - {url: "https://www.bimmerforums.co.uk/threads/air-intake-swirl-flap-fault.589180/", source_type: forum, source_market: UK, lang_original: en, confidence: low}
      - {url: "https://blog.mtautoparts.com/2026/05/common-bmw-n47-engine-problems.html", source_type: base_technique, source_market: EU, lang_original: en, confidence: medium}

maintenance:
  - operation: controle_chaine_distribution
    label: "Contrôle de l'état de la chaîne de distribution (écoute au démarrage à froid), prévenir la rupture"
    related_gammes: [kit-de-chaine-de-distribution, chaine-de-distribution]
    sources:
      - {url: "https://www.autodoc.co.uk/info/bmw-e90-n47-timing-chain-failures", source_type: base_technique, source_market: UK, lang_original: en, confidence: high}
  - operation: nettoyage_controle_vanne_egr
    label: "Nettoyage et contrôle de la vanne/refroidisseur EGR contre l'encrassement carbone"
    related_gammes: [vanne-egr]
    sources:
      - {url: "https://www.bimmer-mag.com/issues-with-n47-and-b47-engines/", source_type: presse, source_market: US, lang_original: en, confidence: medium}
