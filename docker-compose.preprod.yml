services:
  monorepo_preprod:
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis_preprod:6379
      - REDIS_HOST=redis_preprod
      - REDIS_PORT=6379
      - NODE_ENV=production
      - APP_ENV=preprod
      - DATABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
      - SUPABASE_URL
      # SESSION_SECRET : required by main.ts:102 fail-fast (PR #339, NODE_ENV=production
      # >= 32 chars non-placeholder). Injected via secrets.PREPROD_SESSION_SECRET → .env
      # heredoc in ci.yml deploy job → loaded by env_file + shell `. .env`.
      - SESSION_SECRET
      - USE_UNIFIED_RPC=true
      # 🛡️ RPC Safety Gate - ENFORCE P1 (2026-02-03)
      - RPC_GATE_MODE=enforce
      - RPC_GATE_ENFORCE_LEVEL=P1
      # 🚨 Sentry — values inherited from `sops exec-env secrets/sentry.dev.sops.env`
      # wrapping the deploy command. See docs/runbooks/sentry-vps-setup.md.
      # Variable name only (no `=value`) means "inherit from host process env".
      - SENTRY_DSN
      - VITE_SENTRY_DSN
      - SENTRY_ENVIRONMENT
      - SENTRY_TRACES_SAMPLE_RATE
      - SENTRY_RELEASE
      - SENTRY_SEND_PII
      - SENTRY_ALLOW_DEBUG_ENDPOINT
      # 🎯 CrUX API — ADR-063 (Accepted 2026-05-14) — CWV field monitoring
      # Variable name only = inherit from host env (loaded via env_file: .env).
      # Backend-only secret, jamais exposé frontend.
      - CRUX_API_KEY

    container_name: nestjs-remix-monorepo-preprod
    image: massdoc/nestjs-remix-monorepo:preprod
    restart: always
    ports:
      - "3200:3000"
    volumes:
      # Sitemap output directory — writable, isolated from PROD's /var/www/sitemaps.
      # The path follows the canonical `/dev/volumes/nestjs-remix/preprod/*` pattern
      # used by `redis_preprod.sessions`. Without this mount, the backend crashed
      # with ENOENT on first POST /api/sitemap/v10/generate-all in preprod
      # (discovered 2026-05-14 post PR #487 deploy). PROD uses /var/www/sitemaps;
      # preprod is isolated so a faulty regen here cannot corrupt PROD's served files.
      - /dev/volumes/nestjs-remix/preprod/sitemaps/:/var/www/sitemaps:rw
      - /dev/volumes/nestjs-remix/preprod/crawl-hubs/:/var/www/crawl-hubs:rw
    networks:
      - automecanik-preprod
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis_preprod:
    image: redis:7-alpine
    container_name: redis-preprod
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - /dev/volumes/nestjs-remix/preprod/sessions/:/data
    networks:
      - automecanik-preprod

networks:
  automecanik-preprod:
    driver: bridge
