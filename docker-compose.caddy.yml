services:
  caddy:
    image: caddy:2-alpine
    container_name: nestjs-remix-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      # Configuration
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro

      # Cloudflare Origin CA cert (15 ans, hors ACME) — fichiers déposés sur le serveur,
      # JAMAIS committés (.gitignored). Incident 2026-06-08 : cert LE expiré, renouvellement
      # ACME impossible car origine firewall-locked aux IPs Cloudflare.
      - ./config/caddy/origin:/etc/caddy/origin:ro

      # Données persistantes (certificats SSL)
      - caddy_data:/data
      - caddy_config:/config

      # Logs
      - ./logs/caddy:/var/log/caddy

      # Sitemaps statiques (321k URLs générés automatiquement)
      - /var/www/sitemaps:/var/www/sitemaps:ro

      # HTML Hubs pour crawl (289k URLs)
      - /var/www/crawl-hubs:/var/www/crawl-hubs:ro

      # Configuration générée pour redirections (optionnel)
      - ./config/caddy/caddy-pieces-redirects.conf:/etc/caddy/redirects.conf:ro
    
    environment:
      - CADDY_ADMIN=off
    
    networks:
      - automecanik-prod
    
    depends_on:
      - monorepo_prod
    
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Service de génération automatique des règles de redirection (optionnel)
  caddy-config-generator:
    image: curlimages/curl:latest
    container_name: caddy-config-generator
    profiles: ["tools"]
    command: >
      sh -c "
      echo '🔄 Génération de la configuration Caddy...';
      curl -s http://monorepo_prod:3000/api/vehicles/migration/generate-caddy-rules > /output/caddy-pieces-redirects.conf;
      echo '✅ Configuration générée!';
      "
    volumes:
      - ./:/output
    networks:
      - automecanik-prod
    depends_on:
      - monorepo_prod

networks:
  automecanik-prod:
    external: true

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
