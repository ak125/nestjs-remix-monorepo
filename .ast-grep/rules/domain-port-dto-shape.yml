id: domain-port-dto-shape
language: typescript
severity: error
message: |
  Port DTO interface has too many fields (max 8 top-level). A DTO that grows
  past 8 fields is becoming a domain entity in disguise — split the response
  into multiple intent-specific DTOs or move the structure into the owning
  domain (canon `ddd-bounded-contexts-anti-god-engine`).

  Why this matters (Diagnostic Control Plane V1, ADR-pending) :
    - Ports return DTOs, never foreign domain entities (canon : data crosses
      a bounded-context boundary only in DTO shape).
    - 8 fields is the V1 ceiling — beyond that, the DTO is hauling too much
      structure across the boundary, which indicates leaky coupling.
    - Nesting depth is a separate concern (max 3 levels), checked by a
      dedicated rule in PR-B if/when needed.

  Fix:
    1. Split the DTO into two intent-specific shapes (e.g. SuggestedGamme +
       SuggestedGammePricing) and return only the one the caller needs.
    2. If the DTO must stay wide, audit whether the consumer truly needs all
       fields — if not, prune them.
    3. Last resort : ADR L4 to bump the ceiling (do not skip — wide DTOs are
       almost always a hand-off-everything anti-pattern).

  Severity tier : L2 (PR-block + override `pr-toolkit:override-L2`) per
  `.claude/governance/guard-hierarchy.yaml`.
files:
  - backend/src/**/ports/**/*.port.ts
  - backend/src/**/ports/**/*.ts
ignores:
  - backend/src/**/ports/**/*.spec.ts
  - backend/src/**/ports/**/*.test.ts
  - backend/src/**/ports/README.md
rule:
  pattern: |
    export interface $DTO {
      $F1;
      $F2;
      $F3;
      $F4;
      $F5;
      $F6;
      $F7;
      $F8;
      $F9;
      $$$
    }
