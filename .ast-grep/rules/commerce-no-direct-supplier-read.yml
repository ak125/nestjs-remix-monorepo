id: commerce-no-direct-supplier-read
language: typescript
# PR-A introduced this rule as severity:off. PR-D removes SuppliersService scoring
# fictif (createSupplier, linkSupplierToBrand, findBest/calculateSupplier,
# findAlternativeSuppliers, autoAssignSuppliers) and switches to error here.
# TODO V1.5+: extend pattern to also match `from(TABLES.xtr_supplier)` (TS alias);
# current literal pattern catches new direct reads only — additional cleanup tracked
# separately for getProductSuppliers / deactivateSupplier / generatePurchaseOrder.
severity: error
message: |
  Direct read of ___xtr_supplier is FORBIDDEN outside SupplierTruthModule.
  Canon: .spec/00-canon/commerce-runtime/authority-graph.yaml#reads.supplier_truth
  Use SupplierTruthProjection (read API) instead.
note: |
  Activated post-cleanup of SuppliersService scoring fictif (F4, Vault #301).
  Override allowed for migrations and audit scripts (// AUTHORITY-OVERRIDE: <reason>).
files:
  - backend/src/**/*.ts
ignores:
  - backend/src/modules/supplier-truth/**
  - backend/supabase/migrations/**
  - scripts/audit/**
rule:
  any:
    - pattern: $X.from('___xtr_supplier').$$$
    - pattern: $X.from("___xtr_supplier").$$$
