id: backend-no-legacy-route-wildcard
language: typescript
severity: error
message: |
  Legacy path-to-regexp v6 route wildcard syntax — interdit depuis la migration
  Express 5 / NestJS 11 (path-to-regexp 8, PR-9f).

  path-to-regexp 8 a supprimé les groupes regex inline `(.*)`, les wildcards
  non-nommés `*` et la forme `:name*`. Toute réintroduction casse le boot
  (`TypeError`/`Unsupported route path`) ou réactive le double-décodage
  (CWE-174) que la migration a éliminé.

  Syntaxe canon v8 :
    - universel (matche la racine + tout)  : `@All('{*path}')`, `forRoutes('{*path}')`,
      `forRoutes({ path: '{*path}', method: RequestMethod.ALL })`
    - splat nommé scopé (préfixe ancré)    : `forRoutes({ path: 'api/diagnostic/*path', ... })`
    - param splat dans un handler          : `@SplatPath()` / `@SplatPath('url')`
      (déjà décodé, ne JAMAIS re-`decodeURIComponent` — voir
      backend-no-decode-in-splat-controllers).

  Corpus = 0 au merge PR-9f (14 patterns migrés). `severity: error` d'emblée.
files:
  - backend/src/**/*.controller.ts
  - backend/src/**/*.module.ts
  - backend/src/main.ts
ignores:
  - backend/src/**/__tests__/**
  - backend/src/**/*.spec.ts
  - backend/src/**/*.test.ts
rule:
  any:
    # (1) route string with a legacy regex group `(.*)` or named-star `:name*`.
    #     Safe across all strings in these files: `.select('*')` etc. contain a
    #     bare star but never `(.*)` nor `:name*`.
    - kind: string
      regex: '\(\.\*\)|:[A-Za-z_][A-Za-z0-9_]*\*'
    # (2) bare-star wildcard passed to forRoutes — `forRoutes('*')` / `forRoutes("*")`.
    - pattern: $X.forRoutes($A)
    # (3) `{ path: '*' }` or a legacy unnamed trailing `/​*` in a forRoutes object.
    #     The named form `{ path: 'api/x/*path' }` ends in `*path'`, not `/*'`, so it passes.
    - kind: pair
      all:
        - has:
            field: key
            regex: '^path$'
        - has:
            field: value
            regex: '^[''"`]\*[''"`]$|/\*[''"`]$'
constraints:
  A:
    regex: '^[''"`]\*[''"`]$'
