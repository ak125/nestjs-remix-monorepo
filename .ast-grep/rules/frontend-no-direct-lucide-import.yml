id: frontend-no-direct-lucide-import
language: tsx
severity: error
message: |
  Direct import from `lucide-react` is forbidden outside the icon registry.
  Import from `~/lib/icons` instead.

  The registry at `frontend/app/lib/icons.ts` is the single source of truth
  for which icons are used in the app. It re-exports only the icons that
  are actually consumed, regenerated by
  `node scripts/perf/refresh-icon-registry.mjs`.

  This rule prevents drift (random `lucide-react` imports re-introducing
  unused icons over time) and keeps icon usage auditable in code review.
note: |
  To add a new icon:
    1. Edit your component:  import { NewIcon } from '~/lib/icons';
    2. Run:  node scripts/perf/refresh-icon-registry.mjs
    3. The script appends NewIcon to frontend/app/lib/icons.ts
    4. Commit both files.

  See ADR-051 (governance-vault) for the broader bundle enforcement
  methodology.
files:
  - frontend/app/**/*.ts
  - frontend/app/**/*.tsx
ignores:
  # The registry itself is the only legitimate consumer of `lucide-react`.
  - "**/frontend/app/lib/icons.ts"
rule:
  any:
    - pattern: import { $$$ } from 'lucide-react'
    - pattern: import { $$$ } from "lucide-react"
    - pattern: import type { $$$ } from 'lucide-react'
    - pattern: import type { $$$ } from "lucide-react"
    - pattern: import * as $X from 'lucide-react'
    - pattern: import * as $X from "lucide-react"
