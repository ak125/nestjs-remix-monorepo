id: domain-port-method-cap
language: typescript
severity: error
message: |
  Cross-domain Port interface has too many methods (max 5). A Port that grows
  beyond 5 methods is becoming an "API interne géante" (canon
  `ddd-bounded-contexts-anti-god-engine`) — split it into multiple intent-based
  Ports OR refuse the addition.

  Why this matters (Diagnostic Control Plane V1, ADR-pending) :
    - Bounded contexts cross-domain handoffs go through Ports
    - Ports must remain MINIMAL, INTENT-BASED, STABLE
    - More than 5 methods = coupling déguisé, monstre caché
    - Each Port = ONE intent (e.g. CommercePort.suggestParts), not a generic API

  Fix:
    1. Identify the dominant intent of the current Port
    2. Move secondary methods to dedicated Ports (e.g. CommercePricingPort)
    3. Or refuse the new method (open ADR L4 if architectural change needed)

  See backend/src/modules/diagnostic-engine/ports/README.md for the port rules
  reference. See memory `ddd-bounded-contexts-anti-god-engine` for the canon.
files:
  - backend/src/**/ports/**/*.port.ts
  - backend/src/**/ports/**/*.ts
ignores:
  - backend/src/**/ports/**/*.spec.ts
  - backend/src/**/ports/**/*.test.ts
  - backend/src/**/ports/README.md
rule:
  all:
    - pattern: |
        export interface $PORT {
          $METHOD1
          $METHOD2
          $METHOD3
          $METHOD4
          $METHOD5
          $METHOD6
          $$$
        }
    - has:
        kind: type_identifier
        regex: 'Port$'
        stopBy: end
