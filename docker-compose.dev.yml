services:
  monorepo_dev:
    environment:
      - REDIS_URL=redis://redis_dev:6379
      - NODE_ENV=development
      - DATABASE_URL

    container_name: nestjs-remix-monorepo-dev
    build:
      context: .
      dockerfile: Dockerfile
    # image: massdoc/nestjs-remix-monorepo:dev
    restart: always
    ports:
      - 3000:3000
  redis_dev:
    image: redis:7-alpine
    restart: always
    # SECURITY: Never expose Redis publicly - internal network only
    # BSI CB-Report#20260422-10008190 — ports retirés volontairement
    # Accès via réseau Docker uniquement (monorepo_dev via hostname redis_dev)
    # Pour debug local : docker exec redis-dev redis-cli
    # ports:
    #   - '6379:6379'
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - ./cache:/data
      # - /dev/volumes/nestjs-remix/dev/sessions/:/data